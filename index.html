            <div style="width:34px;height:34px;border-radius:50%;background:#FAEEDA;color:#633806;display:flex;align-items:center;justify-content:center;font-size:16px;flex-shrink:0;">🏪</div>
            <div>
              <div style="font-size:13px;font-weight:600;">${f.nom||'Nouveau fournisseur'}</div>
              <div style="font-size:11px;color:var(--secondary);">${[f.type,f.tel].filter(Boolean).join(' · ')||'—'}</div>
            </div>
          </div>
          <div style="display:flex;align-items:center;gap:6px;">
            <button class="btn-edit" onclick="event.preventDefault();event.stopPropagation();openFournModal(${i})" style="font-size:13px;">✏️</button>
            <button class="btn-del" onclick="event.preventDefault();event.stopPropagation();removeFourn(${i})">✕</button>
          </div>
        </summary>
        <div style="margin-top:12px;border-top:1px solid var(--border);padding-top:12px;">
          <div class="grid2">
            <div class="field"><label>Nom / Compagnie</label><input type="text" value="${f.nom||''}" oninput="updateFourn(${i},'nom',this.value)" placeholder="Nom"/></div>
            <div class="field"><label>Contact</label><input type="text" value="${f.contact||''}" oninput="updateFourn(${i},'contact',this.value)" placeholder="Prénom Nom"/></div>
          </div>
          <div class="grid2">
            <div class="field"><label>Téléphone</label><input type="tel" value="${f.tel||''}" oninput="updateFourn(${i},'tel',this.value)" placeholder="514 000-0000" inputmode="tel"/></div>
            <div class="field"><label>Courriel</label><input type="email" value="${f.courriel||''}" oninput="updateFourn(${i},'courriel',this.value)" placeholder="email@exemple.com" inputmode="email"/></div>
          </div>
          <div class="field"><label>Type de matériaux</label><input type="text" value="${f.type||''}" oninput="updateFourn(${i},'type',this.value)" placeholder="Ex: Bois, Béton, Quincaillerie..."/></div>
          <button class="btn btn-sm" onclick="saveToCloud()">💾 Sauvegarder</button>
        </div>
      </details>
    </div>`).join('');
  return`<div style="display:flex;justify-content:flex-end;margin-bottom:12px;"><button class="btn btn-primary" style="width:auto;padding:10px 20px;" onclick="addFourn()">+ Ajouter un fournisseur</button></div>${cards}`;
}
function addFourn(){openFournModal(-1);}
function removeFourn(i){if(!confirm("Supprimer ce fournisseur?"))return;state.fournisseurs.splice(i,1);smartRender();saveToCloud();}

function openFournModal(idx){
  const isNew=idx===-1;
  const f=isNew?{nom:'',contact:'',tel:'',courriel:'',type:''}:state.fournisseurs[idx];
  document.getElementById('modalBox').innerHTML=`
    <div class="modal-header"><h3>${isNew?'Nouveau fournisseur':'Modifier fournisseur'}</h3><button class="modal-close" onclick="closeModal()">×</button></div>
    <div class="grid2">
      <div class="field"><label>Nom / Compagnie</label><input type="text" id="fo-nom" value="${f.nom||''}" placeholder="Nom"/></div>
      <div class="field"><label>Contact</label><input type="text" id="fo-con" value="${f.contact||''}" placeholder="Prénom Nom"/></div>
    </div>
    <div class="grid2">
      <div class="field"><label>Téléphone</label><input type="tel" id="fo-tel" value="${f.tel||''}" placeholder="514 000-0000" inputmode="tel"/></div>
      <div class="field"><label>Courriel</label><input type="email" id="fo-cou" value="${f.courriel||''}" placeholder="email@exemple.com" inputmode="email"/></div>
    </div>
    <div class="field"><label>Type de matériaux</label><input type="text" id="fo-typ" value="${f.type||''}" placeholder="Ex: Bois, Béton, Quincaillerie..."/></div>
    <div style="display:flex;gap:8px;">
      <button class="btn btn-primary" style="flex:1;" onclick="saveFournModal(${idx})">💾 Sauvegarder</button>
      ${!isNew?`<button class="btn btn-sm btn-danger" onclick="removeFournModal(${idx})">🗑 Supprimer</button>`:''}
    </div>`;
  document.getElementById('modalOverlay').classList.add('open');
}

function saveFournModal(idx){
  const f={nom:document.getElementById('fo-nom').value.trim(),contact:document.getElementById('fo-con').value.trim(),tel:document.getElementById('fo-tel').value.trim(),courriel:document.getElementById('fo-cou').value.trim(),type:document.getElementById('fo-typ').value.trim()};
  if(idx===-1)state.fournisseurs.push(f);
  else state.fournisseurs[idx]=f;
  closeModal();saveToCloud();
  const cf=document.getElementById('content-facturation');
  if(cf)cf.innerHTML=buildFournisseurs();
  const cc=document.getElementById('content-chantiers');
  if(cc&&state.currentSub['chantiers']==='fournisseurs_fiches')cc.innerHTML=buildFournisseursFiches();
}

function removeFournModal(idx){
  if(!confirm("Supprimer ce fournisseur?"))return;
  state.fournisseurs.splice(idx,1);
  closeModal();saveToCloud();
  const c=document.getElementById('content-facturation');
  if(c)c.innerHTML=buildFournisseurs();
}
function updateFourn(i,field,val){state.fournisseurs[i][field]=val;}

// ─── NOUVELLE FACTURE ─────────────────────────────────────
let factCourante={
  chantier:'',dateDebut:'',dateFin:'',
  lignesSst:[],lignesMat:[],
  fraisGestion:0,tpsTaux:5,tvqTaux:9.975,
  appliquerTPS:true,appliquerTVQ:true,appliquerFG:true,
  notes:'',numeroFacture:''
};

function buildNouvelleFacture(){
  const chOpts=selOpts(state.chantiers,factCourante.chantier,'-- Choisir un chantier --');
  const sstOpts='<option value="">-- Choisir --</option>'+state.sstraitants.map(s=>`<option value="${esc(s.nom)}">${s.nom}${s.specialite?' ('+s.specialite+')':''}</option>`).join('');
  const fournOpts='<option value="">-- Choisir --</option>'+state.fournisseurs.map(f=>`<option value="${esc(f.nom)}">${f.nom}</option>`).join('');
  const fiche=factCourante.chantier?state.fiches[factCourante.chantier]||{}:{};
  const fg=parseFloat(fiche.fraisGestion)||0;

  // Main d'oeuvre section
  let mdoHtml='';
  let mdoTotal=0;
  if(factCourante.chantier&&factCourante.dateDebut&&factCourante.dateFin){
    const d1=new Date(factCourante.dateDebut+'T00:00:00'),d2=new Date(factCourante.dateFin+'T23:59:59');
    const taux=parseFloat(fiche.taux)||0;
    Object.entries(EMPS).forEach(([empKey,e])=>{
      const filtered=state.entries[empKey].filter(en=>{
        const d=new Date(en.date+'T12:00:00');
        return en.chantier===factCourante.chantier&&d>=d1&&d<=d2&&en.heures>0&&en.facturable;
      });
      if(!filtered.length)return;
      const byType={};
      filtered.forEach(en=>{if(!byType[en.type||'Général'])byType[en.type||'Général']=0;byType[en.type||'Général']+=en.heures;});
      const totalEmp=filtered.reduce((s,en)=>s+en.heures,0);
      const montantEmp=taux>0?totalEmp*taux:0;
      mdoTotal+=montantEmp;
      const typeRows=Object.entries(byType).map(([t,h])=>`<tr><td style="padding:3px 0 3px 12px;font-size:11px;color:var(--secondary);">${t}</td><td style="text-align:right;font-size:11px;">${h.toFixed(2)}h</td><td></td></tr>`).join('');
      mdoHtml+=`<tr><td style="padding:5px 0;font-weight:500;">${e.label}</td><td style="text-align:right;">${totalEmp.toFixed(2)}h${taux>0?' × '+taux+' $':''}</td><td style="text-align:right;font-weight:600;color:#0C447C;">${taux>0?montantEmp.toFixed(2)+' $':'—'}</td></tr>${typeRows}`;
    });
  }

  // Sous-traitants lines
  const sstLines=factCourante.lignesSst.map((l,i)=>`
    <div class="facture-line">
      <select onchange="updateLigneSst(${i},'sst',this.value)" style="flex:1;font-size:12px;">${sstOpts.replace('value="'+esc(l.sst)+'"','value="'+esc(l.sst)+'" selected')}</select>
      <input type="text" value="${l.desc||''}" oninput="updateLigneSst(${i},'desc',this.value)" placeholder="Description" style="flex:1;font-size:12px;"/>
      <input type="number" value="${l.montant||''}" oninput="updateLigneSst(${i},'montant',this.value)" placeholder="Montant $" style="width:100px;font-size:12px;" inputmode="decimal"/>
      <button class="btn-del" onclick="removeLigneSst(${i})">✕</button>
    </div>`).join('');
  let sstTotal=0;
  if(factCourante.chantier&&factCourante.dateDebut&&factCourante.dateFin){
    const ss1=new Date(factCourante.dateDebut+'T00:00:00'),ss2=new Date(factCourante.dateFin+'T23:59:59');
    sstTotal=state.sstFactures.filter(a=>{const d=new Date(a.date+'T12:00:00');return a.chantier===factCourante.chantier&&a.facturable===true&&d>=ss1&&d<=ss2;}).reduce((s,a)=>s+(parseFloat(a.montant)||0),0);
  }

  // Matériaux — auto-pull from achats for chantier + period
  let matRows='', matTotal=0;
  const matDateDebut=factCourante.matDateDebut||factCourante.dateDebut||'';
  const matDateFin=factCourante.matDateFin||factCourante.dateFin||'';
  if(factCourante.chantier&&matDateDebut&&matDateFin){
    const md1=new Date(matDateDebut+'T00:00:00'), md2=new Date(matDateFin+'T23:59:59');
    const achatsFacturables=state.achats.filter(a=>{
      const d=new Date(a.date+'T12:00:00');
      return a.chantier===factCourante.chantier && a.facturable===true && d>=md1 && d<=md2;
    });
    if(achatsFacturables.length){
      matRows=achatsFacturables.map(a=>`
        <tr style="border-bottom:1px solid var(--border);">
          <td style="padding:5px 0;font-size:12px;">${a.date}</td>
          <td style="padding:5px 0;font-size:12px;">${a.magasin||'—'}</td>
          <td style="padding:5px 0;font-size:12px;color:var(--secondary);">${a.description||'—'}</td>
          <td style="padding:5px 0;font-size:11px;text-align:center;"><span style="background:#E6F1FB;color:#0C447C;padding:2px 6px;border-radius:20px;font-size:10px;">💳 ${a.carte}</span></td>
          <td style="padding:5px 0;text-align:right;font-weight:600;">${parseFloat(a.montantAvantTax).toFixed(2)} $</td>
        </tr>`).join('');
      matTotal=achatsFacturables.reduce((s,a)=>s+(parseFloat(a.montantAvantTax)||0),0);
    }
  }

  // Totaux
  const soustotal=mdoTotal+sstTotal+matTotal;
  const montantFG=factCourante.appliquerFG&&fg>0?soustotal*(fg/100):0;
  const avantTaxes=soustotal+montantFG;
  const tps=factCourante.appliquerTPS?avantTaxes*0.05:0;
  const tvq=factCourante.appliquerTVQ?avantTaxes*0.09975:0;
  const grandTotal=avantTaxes+tps+tvq;

  // Fiche client liée au chantier
  const cidx=fiche.clientIdx!==undefined&&fiche.clientIdx!==''?parseInt(fiche.clientIdx):-1;
  const clientLie=cidx>=0&&state.clients[cidx]?state.clients[cidx]:null;
  const clientNomFac=clientLie?[clientLie.prenom,clientLie.nom].filter(Boolean).join(' '):'';

  return`
    <div class="card">
      <div class="card-title">🧾 Nouvelle facture</div>
      <div class="grid2">
        <div class="field"><label>No. de facture</label><input type="text" id="fac-num" value="${factCourante.numeroFacture||''}" oninput="factCourante.numeroFacture=this.value" placeholder="Ex: 2024-001"/></div>
        <div class="field"><label>Chantier</label><select id="fac-ch" onchange="factCourante.chantier=this.value;refreshFacture()">${chOpts}</select></div>
      </div>
      ${clientNomFac?`<div style="background:#E6F1FB;border-radius:var(--radius-sm);padding:8px 12px;font-size:12px;display:flex;align-items:center;gap:8px;margin-top:-4px;">
        <span>👤</span><span style="font-weight:500;">${clientNomFac}</span>
        ${clientLie&&clientLie.tel?`<span style="color:var(--secondary);">· ${clientLie.tel}</span>`:''}
      </div>`:''}
      <div class="grid2" style="margin-top:12px;">
        <div class="field"><label>📅 Date de début</label><input type="date" id="fac-d1" value="${factCourante.dateDebut||''}" oninput="factCourante.dateDebut=this.value;factCourante.matDateDebut=this.value;refreshFacture()" style="width:100%;color:var(--primary);"/></div>
        <div class="field"><label>📅 Date de fin</label><input type="date" id="fac-d2" value="${factCourante.dateFin||''}" oninput="factCourante.dateFin=this.value;factCourante.matDateFin=this.value;refreshFacture()" style="width:100%;color:var(--primary);"/></div>
      </div>
      ${factCourante.chantier&&factCourante.dateDebut&&factCourante.dateFin?`<div style="background:#f0f0f0;border-radius:var(--radius-sm);padding:6px 10px;font-size:11px;color:var(--secondary);margin-top:-4px;">
        Les heures, factures SST et matériaux facturables pour <strong>${factCourante.chantier}</strong> entre ces dates sont chargés automatiquement ci-dessous.
      </div>`:''}
    </div>

    <div class="card no-print">
      <div class="facture-section-title">👷 MAIN D'ŒUVRE</div>
      ${factCourante.chantier&&factCourante.dateDebut&&factCourante.dateFin?
        mdoHtml?`<table style="width:100%;border-collapse:collapse;font-size:13px;">
          <thead><tr style="border-bottom:1px solid var(--border);">
            <td style="padding:4px 0;font-weight:600;">Employé</td>
            <td style="text-align:right;font-weight:600;">Heures</td>
            <td style="text-align:right;font-weight:600;">Montant</td>
          </tr></thead>
          <tbody>${mdoHtml}</tbody>
          <tfoot><tr style="border-top:2px solid var(--border);">
            <td colspan="2" style="padding:6px 0;font-weight:700;">Sous-total main d'œuvre</td>
            <td style="text-align:right;font-weight:700;color:#0C447C;">${mdoTotal.toFixed(2)} $</td>
          </tr></tfoot>
        </table>`:
        '<div class="empty" style="padding:16px;">Aucune heure facturable trouvée pour cette période sur ce chantier.</div>':
        '<div class="empty" style="padding:16px;">Choisis un chantier et une période pour voir les heures.</div>'}
    </div>

    <div class="card no-print">
      <div class="facture-section-title">🔨 SOUS-TRAITANTS</div>
      <p style="font-size:12px;color:var(--secondary);margin:0 0 10px;">Basé sur les factures SST facturables pour ce chantier et cette période.</p>
      ${factCourante.chantier&&factCourante.dateDebut&&factCourante.dateFin?(()=>{
        const sd1=new Date(factCourante.dateDebut+'T00:00:00'),sd2=new Date(factCourante.dateFin+'T23:59:59');
        const sstFacts=state.sstFactures.filter(a=>{
          const d=new Date(a.date+'T12:00:00');
          return a.chantier===factCourante.chantier&&a.facturable===true&&d>=sd1&&d<=sd2;
        });
        if(!sstFacts.length)return '<div style="font-size:12px;color:var(--secondary);padding:8px 0;">Aucune facture SST facturable trouvée pour ce chantier sur cette période.</div>';
        const parSst={};
        sstFacts.forEach(a=>{if(!parSst[a.sst])parSst[a.sst]={total:0,items:[]};parSst[a.sst].total+=(parseFloat(a.montant)||0);parSst[a.sst].items.push(a);});
        const sstTotal=sstFacts.reduce((s,a)=>s+(parseFloat(a.montant)||0),0);
        const rows=Object.entries(parSst).map(([sst,d])=>`
          <tr style="border-bottom:1px solid var(--border);">
            <td style="padding:6px 0;font-size:13px;font-weight:500;">${sst}</td>
            <td style="padding:6px 0;font-size:12px;color:var(--secondary);">${d.items.length} facture${d.items.length>1?'s':''}</td>
            <td style="padding:6px 0;text-align:right;font-weight:600;">${d.total.toFixed(2)} $</td>
          </tr>`).join('');
        return `<table style="width:100%;border-collapse:collapse;font-size:13px;">
          <thead><tr style="border-bottom:1px solid var(--border);"><td style="padding:4px 0;font-weight:600;">Sous-traitant</td><td style="padding:4px 0;font-weight:600;">Détail</td><td style="text-align:right;font-weight:600;">Montant</td></tr></thead>
          <tbody>${rows}</tbody>
          <tfoot><tr style="border-top:2px solid var(--border);"><td colspan="2" style="padding:6px 0;font-weight:700;">Sous-total sous-traitants</td><td style="text-align:right;font-weight:700;color:#0C447C;">${sstTotal.toFixed(2)} $</td></tr></tfoot>
        </table>`;
      })():'<div style="font-size:12px;color:var(--secondary);padding:8px 0;">Choisis un chantier et une période pour voir les factures SST.</div>'}
    </div>

    <div class="card no-print">
      <div class="facture-section-title">🪵 MATÉRIAUX</div>
      ${factCourante.chantier&&factCourante.dateDebut&&factCourante.dateFin?
        matRows?`<table style="width:100%;border-collapse:collapse;font-size:13px;">
          <thead><tr style="border-bottom:1px solid var(--border);">
            <td style="padding:4px 0;font-weight:600;font-size:11px;">Date</td>
            <td style="padding:4px 0;font-weight:600;font-size:11px;">Magasin</td>
            <td style="padding:4px 0;font-weight:600;font-size:11px;">Description</td>
            <td style="padding:4px 0;font-weight:600;font-size:11px;text-align:center;">Carte</td>
            <td style="padding:4px 0;font-weight:600;font-size:11px;text-align:right;">Montant</td>
          </tr></thead>
          <tbody>${matRows}</tbody>
          <tfoot><tr style="border-top:2px solid var(--border);">
            <td colspan="4" style="padding:6px 0;font-weight:700;">Sous-total matériaux</td>
            <td style="text-align:right;font-weight:700;color:#0C447C;">${matTotal.toFixed(2)} $</td>
          </tr></tfoot>
        </table>`:
        '<div style="font-size:12px;color:var(--secondary);padding:8px 0;">Aucun achat facturable trouvé pour ce chantier sur cette période.<br><small>Assure-toi d&#39;avoir entré tes achats dans 🛒 Matériel avec le bon chantier et marqués Facturable.</small></div>':
        '<div style="font-size:12px;color:var(--secondary);padding:8px 0;">Choisis un chantier et une période pour voir les achats facturables.</div>'}
    </div>

    <div class="card">
      <div class="facture-section-title">💰 TOTAUX & TAXES</div>
      <div class="facture-total-row"><span>Sous-total</span><span>${soustotal.toFixed(2)} $</span></div>
      <div class="facture-total-row" style="align-items:center;">
        <label style="display:flex;align-items:center;gap:6px;font-size:13px;cursor:pointer;">
          <input type="checkbox" ${factCourante.appliquerFG?'checked':''} onchange="factCourante.appliquerFG=this.checked;refreshFacture()"/>
          Frais de gestion ${fg>0?'('+fg+'%)':'— configurer dans la fiche chantier'}
        </label>
        <span>${montantFG>0?montantFG.toFixed(2)+' $':'—'}</span>
      </div>
      <div class="facture-total-row"><span style="font-weight:600;">Avant taxes</span><span style="font-weight:600;">${avantTaxes.toFixed(2)} $</span></div>
      <div class="facture-total-row" style="align-items:center;">
        <label style="display:flex;align-items:center;gap:6px;font-size:13px;cursor:pointer;">
          <input type="checkbox" ${factCourante.appliquerTPS?'checked':''} onchange="factCourante.appliquerTPS=this.checked;refreshFacture()"/> TPS (5%)
        </label>
        <span>${tps.toFixed(2)} $</span>
      </div>
      <div class="facture-total-row" style="align-items:center;">
        <label style="display:flex;align-items:center;gap:6px;font-size:13px;cursor:pointer;">
          <input type="checkbox" ${factCourante.appliquerTVQ?'checked':''} onchange="factCourante.appliquerTVQ=this.checked;refreshFacture()"/> TVQ (9.975%)
        </label>
        <span>${tvq.toFixed(2)} $</span>
      </div>
      <div class="facture-total-row grand"><span>TOTAL</span><span>${grandTotal.toFixed(2)} $</span></div>
    </div>

    <div class="card">
      <div class="field"><label>Notes / Conditions de paiement</label>
        <textarea id="fac-notes" oninput="factCourante.notes=this.value" placeholder="Ex: Paiement dû dans 30 jours..." style="width:100%;border-radius:var(--radius-sm);border:1px solid var(--border);border-radius:var(--radius-sm);padding:10px;font-size:13px;min-height:80px;">${factCourante.notes||''}</textarea>
      </div>
      <div style="display:flex;gap:8px;flex-wrap:wrap;" class="no-print">
        <button class="btn-pdf" onclick="apercuFactureCourante()">👁 Aperçu & Envoyer</button>
        <button class="btn btn-primary" style="flex:1;" onclick="sauvegarderFacCourante()">💾 Brouillon</button>
        <button class="btn btn-primary" style="flex:1;background:#27500A;" onclick="sauvegarderFacture()">✅ Finaliser</button>
        <button class="btn btn-sm" onclick="resetFacture()">↺</button>
      </div>
    </div>`;
}

function refreshFacture(){
  const c=document.getElementById('content-facturation');
  if(c&&state.currentSub['facturation']==='nouvelle')c.innerHTML=buildNouvelleFacture();
}
function addLigneSst(){factCourante.lignesSst.push({sst:'',desc:'',montant:''});refreshFacture();}
function removeLigneSst(i){factCourante.lignesSst.splice(i,1);refreshFacture();}
function updateLigneSst(i,f,v){factCourante.lignesSst[i][f]=v;if(f!=='desc')refreshFacture();}
function addLigneMat(){factCourante.lignesMat.push({fourn:'',desc:'',montant:''});refreshFacture();}
function removeLigneMat(i){factCourante.lignesMat.splice(i,1);refreshFacture();}
function updateLigneMat(i,f,v){factCourante.lignesMat[i][f]=v;if(f!=='desc')refreshFacture();}
function resetFacture(){factCourante={chantier:'',dateDebut:'',dateFin:'',lignesSst:[],lignesMat:[],fraisGestion:0,tpsTaux:5,tvqTaux:9.975,appliquerTPS:true,appliquerTVQ:true,appliquerFG:true,notes:'',numeroFacture:''};refreshFacture();}

function preFillFacture(chantier,dateMin,dateMax){
  factCourante.chantier=chantier;
  factCourante.dateDebut=dateMin;
  factCourante.dateFin=dateMax;
  factCourante.matDateDebut=dateMin;
  factCourante.matDateFin=dateMax;
  // Naviguer vers la page facturation
  setEmp('facturation');
  setSub('facturation','courantes');
  // Petit délai pour laisser le DOM se construire avant refresh
  setTimeout(()=>refreshFacture(),100);
}

function sauvegarderFacture(){
  if(!factCourante.chantier){alert("Veuillez choisir un chantier.");return;}
  if(!factCourante.numeroFacture){alert("Veuillez entrer un numéro de facture.");return;}
  const fiche=state.fiches[factCourante.chantier]||{};
  const fg=parseFloat(fiche.fraisGestion)||0;
  const taux=parseFloat(fiche.taux)||0;
  const d1=factCourante.dateDebut?new Date(factCourante.dateDebut+'T00:00:00'):null;
  const d2=factCourante.dateFin?new Date(factCourante.dateFin+'T23:59:59'):null;
  let mdoTotal=0;
  Object.keys(EMPS).forEach(empKey=>{
    if(!d1||!d2)return;
    const filtered=state.entries[empKey].filter(en=>{const d=new Date(en.date+'T12:00:00');return en.chantier===factCourante.chantier&&d>=d1&&d<=d2&&en.heures>0&&en.facturable;});
    const total=filtered.reduce((s,en)=>s+en.heures,0);
    mdoTotal+=taux>0?total*taux:0;
  });
  let sstTotal=0;
  if(factCourante.chantier&&factCourante.dateDebut&&factCourante.dateFin){
    const ss1=new Date(factCourante.dateDebut+'T00:00:00'),ss2=new Date(factCourante.dateFin+'T23:59:59');
    sstTotal=state.sstFactures.filter(a=>{const d=new Date(a.date+'T12:00:00');return a.chantier===factCourante.chantier&&a.facturable===true&&d>=ss1&&d<=ss2;}).reduce((s,a)=>s+(parseFloat(a.montant)||0),0);
  }
  const md1f=factCourante.matDateDebut||factCourante.dateDebut;
  const md2f=factCourante.matDateFin||factCourante.dateFin;
  let matTotal=0;
  if(factCourante.chantier&&md1f&&md2f){
    const md1=new Date(md1f+'T00:00:00'),md2=new Date(md2f+'T23:59:59');
    matTotal=state.achats.filter(a=>{const d=new Date(a.date+'T12:00:00');return a.chantier===factCourante.chantier&&a.facturable===true&&d>=md1&&d<=md2;}).reduce((s,a)=>s+(parseFloat(a.montantAvantTax)||0),0);
  }
  const soustotal=mdoTotal+sstTotal+matTotal;
  const montantFG=factCourante.appliquerFG&&fg>0?soustotal*(fg/100):0;
  const avantTaxes=soustotal+montantFG;
  const tps=factCourante.appliquerTPS?avantTaxes*0.05:0;
  const tvq=factCourante.appliquerTVQ?avantTaxes*0.09975:0;
  const grandTotal=avantTaxes+tps+tvq;
  const facture={
    id:++state.factureId,
    numero:factCourante.numeroFacture,
    chantier:factCourante.chantier,
    dateDebut:factCourante.dateDebut,
    dateFin:factCourante.dateFin,
    dateCreation:new Date().toISOString().slice(0,10),
    lignesSst:JSON.parse(JSON.stringify(factCourante.lignesSst)),
    matDateDebut:factCourante.matDateDebut||factCourante.dateDebut,
    matDateFin:factCourante.matDateFin||factCourante.dateFin,
    appliquerTPS:factCourante.appliquerTPS,
    appliquerTVQ:factCourante.appliquerTVQ,
    appliquerFG:factCourante.appliquerFG,
    notes:factCourante.notes,
    grandTotal:grandTotal,
    statut:'brouillon'
  };
  state.factures.unshift(facture);
  saveToCloud();
  alert("Facture #"+facture.numero+" sauvegardée!");
  setSub('facturation','historique');
}

// ─── HISTORIQUE FACTURES ──────────────────────────────────
function buildHistoriqueFactures(){
  if(!state.factures.length)return`<div class="empty">Aucune facture.<br><br><button class="btn btn-primary" style="width:auto;padding:10px 20px;" onclick="setSub('facturation','courantes')">➕ Créer une facture</button></div>`;

  const totalPaye=state.factures.filter(f=>f.statut==='paye').reduce((s,f)=>s+f.grandTotal,0);
  const totalEnvoyee=state.factures.filter(f=>f.statut==='envoye').reduce((s,f)=>s+f.grandTotal,0);
  const totalBrouillon=state.factures.filter(f=>f.statut==='brouillon').reduce((s,f)=>s+f.grandTotal,0);

  const parChantier={};
  state.factures.forEach(f=>{
    const ch=f.chantier||'— Sans chantier —';
    if(!parChantier[ch])parChantier[ch]=[];
    parChantier[ch].push(f);
  });

  const cartes=Object.entries(parChantier).sort((a,b)=>a[0].localeCompare(b[0])).map(([ch,facs])=>{
    const totalCh=facs.reduce((s,f)=>s+f.grandTotal,0);
    const payeCh=facs.filter(f=>f.statut==='paye').reduce((s,f)=>s+f.grandTotal,0);
    const nbPaye=facs.filter(f=>f.statut==='paye').length;
    const nbEnvoyee=facs.filter(f=>f.statut==='envoye').length;
    const nbBrouillon=facs.filter(f=>f.statut==='brouillon').length;
    const derniere=facs.slice().sort((a,b)=>b.id-a.id)[0];
    const couleur=nbPaye===facs.length?'#27500A':nbEnvoyee>0?'#EF9F27':'#185FA5';
    const statutLabel=nbPaye===facs.length?'✅ Tout payé':nbEnvoyee>0?'📤 En attente':'📝 En cours';
    const chEsc=ch.replace(/'/g,'&#39;');
    return`<div class="card" style="cursor:pointer;border-top:3px solid ${couleur};padding:14px;" onclick="voirFacturesChantier('${chEsc}')">
      <div style="font-size:14px;font-weight:700;margin-bottom:4px;">🏗 ${ch}</div>
      <div style="font-size:11px;color:${couleur};font-weight:600;margin-bottom:10px;">${statutLabel}</div>
      <div style="font-size:22px;font-weight:700;color:#0C447C;margin-bottom:4px;">${totalCh.toFixed(2)} $</div>
      ${payeCh>0?`<div style="font-size:11px;color:#27500A;">✅ ${payeCh.toFixed(2)} $ payé</div>`:''}
      <div style="margin-top:10px;padding-top:10px;border-top:0.5px solid var(--border);display:flex;gap:6px;flex-wrap:wrap;">
        ${nbBrouillon?`<span style="font-size:10px;background:#f0f0f0;color:#555;padding:2px 8px;border-radius:20px;">📝 ${nbBrouillon}</span>`:''}
        ${nbEnvoyee?`<span style="font-size:10px;background:#FEF3C7;color:#92400E;padding:2px 8px;border-radius:20px;">📤 ${nbEnvoyee}</span>`:''}
        ${nbPaye?`<span style="font-size:10px;background:#EAF3DE;color:#27500A;padding:2px 8px;border-radius:20px;">✅ ${nbPaye}</span>`:''}
      </div>
      <div style="font-size:10px;color:var(--secondary);margin-top:8px;">${facs.length} facture${facs.length>1?'s':''} · Dernière: #${derniere.numero||'—'}</div>
    </div>`;
  }).join('');

  return`
    <div class="stats-row" style="margin-bottom:16px;">
      <div class="stat-box stat-fact"><div class="label">✅ Payées</div><div class="value">${totalPaye.toFixed(0)} $</div></div>
      <div class="stat-box stat-nf"><div class="label">📤 Envoyées</div><div class="value">${totalEnvoyee.toFixed(0)} $</div></div>
      <div class="stat-box stat-money"><div class="label">📝 Brouillons</div><div class="value">${totalBrouillon.toFixed(0)} $</div></div>
    </div>
    <div style="display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:12px;">
      ${cartes}
    </div>`;
}

function voirFacturesChantier(ch){

  const rows=facs.map(f=>`

          <span class="statut-badge statut-${f.statut}">${f.statut==='brouillon'?'Brouillon':f.statut==='envoye'?'Envoyée':'Payée'}</span>

  document.getElementById('modalOverlay').classList.add('open');
}
function changerStatutFacture(id,statut){
  const f=state.factures.find(f=>f.id===id);
  if(f){
    f.statut=statut;
    saveToCloud();
    // Refresh historique view
    const c=document.getElementById('content-facturation');
    if(c&&state.currentSub['facturation']==='historique')c.innerHTML=buildHistoriqueFactures();
  }
}

  const nom=document.getElementById('nc-nom').value.trim();
  if(!nom){alert("Veuillez entrer un nom de chantier.");return;}
  if(state.chantiers.includes(nom)){alert("Ce chantier existe déjà.");return;}
  state.chantiers.push(nom);
  state.chantiers.sort();
  if(!state.fiches[nom])state.fiches[nom]={};

const TYPES_DEPENSE_FIXES=['Perso Victor','Perso Edouard','Perso Denis','Camion','Petits outils','Gros outils'];
const CARTES=['Victor','Edouard','Denis'];
const TPS=0.05, TVQ=0.09975;

// ─── MATÉRIEL / ACHATS ────────────────────────────────────
function buildMateriaux(){
  const list=state.achats.slice().sort((a,b)=>b.date.localeCompare(a.date));

  // Stats
  const total=list.reduce((s,a)=>s+(parseFloat(a.montantAvantTax)||0),0);
  const totalAvecTax=list.reduce((s,a)=>s+(parseFloat(a.montantAvecTax)||0),0);
  const parCarte={Victor:0,Edouard:0,Denis:0,Guewenn:0};
  list.forEach(a=>{if(parCarte[a.carte]!==undefined)parCarte[a.carte]+=(parseFloat(a.montantAvantTax)||0);});

  // Filters
  const filtreCarteVal=window._filtreCarteAchats||'';
  const filtreTypeVal=window._filtreTypeAchats||'';
  const filtreMoisVal=window._filtreMoisAchats||'';
  
  const filtered=list.filter(a=>{
    if(filtreCarteVal&&a.carte!==filtreCarteVal)return false;
    if(filtreTypeVal&&a.typeDepense!==filtreTypeVal)return false;
    if(filtreMoisVal&&!a.date.startsWith(filtreMoisVal))return false;
    return true;
  });

  const chOpts='<option value="">-- Aucun (dépense générale) --</option>'+state.chantiers.map(ch=>`<option value="${esc(ch)}">${ch}</option>`).join('');
  const allTypes=[...TYPES_DEPENSE_FIXES,...state.chantiers.map(ch=>'Chantier: '+ch)];

  const rows=filtered.map(a=>{
    const estChantier=a.typeDepense&&a.typeDepense.startsWith('Chantier: ');
    return`<div class="card" style="padding:12px;margin-bottom:8px;">
      <div style="display:flex;justify-content:space-between;align-items:flex-start;gap:8px;">
        <div style="flex:1;">
          <div style="display:flex;align-items:center;gap:6px;flex-wrap:wrap;margin-bottom:4px;">
            <span style="font-size:13px;font-weight:600;">${a.magasin||'—'}</span>
            <span style="font-size:11px;color:var(--secondary);">${a.date}</span>
            <span style="font-size:10px;background:#E6F1FB;color:#0C447C;padding:2px 7px;border-radius:20px;font-weight:600;">💳 ${a.carte}</span>
          </div>
          <div style="display:flex;gap:6px;flex-wrap:wrap;margin-bottom:4px;">
            <span style="font-size:10px;background:#f0f0f0;padding:2px 7px;border-radius:20px;">${a.typeDepense||'—'}</span>
            ${estChantier&&a.facturable!==undefined?`<span class="fbadge ${a.facturable?'fb-y':'fb-n'}">${a.facturable?'Facturable':'Non-fact.'}</span>`:''}
          </div>
          ${a.description?`<div style="font-size:11px;color:var(--secondary);">${a.description}</div>`:''}
        </div>
        <div style="text-align:right;flex-shrink:0;">
          <div style="font-size:14px;font-weight:700;color:#1a1a1a;">${(parseFloat(a.montantAvantTax)||0).toFixed(2)} $</div>
          <div style="font-size:10px;color:var(--secondary);">avec taxes: ${(parseFloat(a.montantAvecTax)||0).toFixed(2)} $</div>
          <button class="btn-edit" onclick="editAchat(${a.id})" style="font-size:12px;">✏️</button>
          <button class="btn-del" onclick="deleteAchat(${a.id})">✕</button>
        </div>
      </div>
    </div>`;}).join('');

  return`
    <div class="card">
      <div class="card-title">🛒 Matériel & Dépenses</div>
      <div class="stats-row-4" style="margin-bottom:10px;">
        <div class="stat-box"><div class="label">Total avant taxes</div><div class="value">${total.toFixed(2)} $</div></div>
        <div class="stat-box" style="background:#E6F1FB;"><div class="label">💳 Victor</div><div class="value" style="color:#0C447C;">${parCarte.Victor.toFixed(2)} $</div></div>
        <div class="stat-box" style="background:#E1F5EE;"><div class="label">💳 Edouard</div><div class="value" style="color:#085041;">${parCarte.Edouard.toFixed(2)} $</div></div>
        <div class="stat-box" style="background:#FAEEDA;"><div class="label">💳 Denis</div><div class="value" style="color:#633806;">${parCarte.Denis.toFixed(2)} $</div></div>
      </div>
      <button class="btn btn-primary" style="margin-bottom:12px;" onclick="openModalAchat()">+ Ajouter une dépense</button>
      <div style="display:flex;gap:8px;flex-wrap:wrap;margin-bottom:12px;">
        <select style="flex:1;font-size:12px;" onchange="window._filtreCarteAchats=this.value;refreshMateriaux()">
          <option value="">Toutes les cartes</option>
          ${CARTES.map(c=>`<option value="${c}" ${filtreCarteVal===c?'selected':''}>${c}</option>`).join('')}

        <select style="flex:1;font-size:12px;" onchange="window._filtreTypeAchats=this.value;refreshMateriaux()">
          <option value="">Tous les types</option>
          ${TYPES_DEPENSE_FIXES.map(t=>`<option value="${t}" ${filtreTypeVal===t?'selected':''}>${t}</option>`).join('')}

      </div>
    </div>
    ${filtered.length?rows:`<div class="empty">Aucune dépense trouvée.</div>`}

        <button id="carte-e" class="${a.carte==='Edouard'?'on-f':''}" onclick="setCarteAchat('Edouard')" style="font-size:12px;">💳 Edouard</button>
        <button id="carte-d" class="${a.carte==='Denis'?'on-f':''}" onclick="setCarteAchat('Denis')" style="font-size:12px;">💳 Denis</button>

        <optgroup label="Dépenses personnelles / équipement">

        </optgroup>

      </select>

      <div class="toggle-group">
        <button id="fact-y" class="${a.facturable?'on-f':''}" onclick="setFactAchat(true)">✓ Facturable</button>
        <button id="fact-n" class="${!a.facturable?'on-nf':''}" onclick="setFactAchat(false)">✕ Non facturable</button>
      </div>
    </div>

      <input type="text" id="a-desc" value="${a.description||''}" placeholder="Description optionnelle..."/>

  window._achatCarte=a.carte||'Victor';
  window._achatFacturable=a.facturable!==false;
  document.getElementById('modalOverlay').classList.add('open');
}

function calcTaxesAchat(val){
  const montant=parseFloat(val)||0;
  const tps=montant*TPS;
  const tvq=montant*TVQ;
  const total=montant+tps+tvq;
  const el=document.getElementById('a-montTax');
  if(el)el.value=total.toFixed(2);
}

function setCarteAchat(carte){
  window._achatCarte=carte;
  ['Victor','Edouard','Denis'].forEach(c=>{
    const btn=document.getElementById('carte-'+c.charAt(0).toLowerCase());
    if(btn)btn.className=c===carte?'on-f':'';
  });
}

function setFactAchat(val){
  window._achatFacturable=val;
  const by=document.getElementById('fact-y'),bn=document.getElementById('fact-n');
  if(by&&bn){by.className=val?'on-f':'';bn.className=!val?'on-nf':'';}
}

function onTypeDepenseChange(val){
  const section=document.getElementById('facturable-section');
  if(section)section.style.display=val.startsWith('Chantier: ')?'':'none';
  // Auto-fill chantier associé
  if(val.startsWith('Chantier: ')){
    const ch=val.replace('Chantier: ','');
    const depCh=document.getElementById('dep-ch');
    if(depCh)depCh.value=ch;
    onDepChantierChange();
  }
}

function saveAchat(editId){
  const date=document.getElementById('a-date').value;
  const magSel=document.getElementById('a-mag').value;
  const magAutre=document.getElementById('a-mag-autre');
  const magasin=magSel==='_autre'?(magAutre?magAutre.value.trim():''):magSel;
  const montantAvantTax=parseFloat(document.getElementById('a-mont').value)||0;
  const typeDepense=document.getElementById('a-type').value;
  const description=document.getElementById('a-desc').value.trim();
  if(!date){alert("Veuillez entrer une date.");return;}
  if(!montantAvantTax){alert("Veuillez entrer un montant.");return;}
  const montantAvecTax=(montantAvantTax*(1+TPS+TVQ)).toFixed(2);
  const estChantier=typeDepense.startsWith('Chantier: ');
  const chantierAssoc=estChantier?typeDepense.replace('Chantier: ',''):'';
  const achat={
    id:editId?editId:++state.achatId,
    date,magasin,
    montantAvantTax:montantAvantTax.toFixed(2),
    montantAvecTax,
    carte:window._achatCarte||'Victor',
    typeDepense,
    chantier:chantierAssoc,
    facturable:estChantier?window._achatFacturable:null,
    description
  };
  if(editId){
    const idx=state.achats.findIndex(a=>a.id===editId);
    if(idx>=0)state.achats[idx]=achat;
  } else {
    state.achats.push(achat);
  }
  closeModal();
  saveToCloud();
  refreshMateriaux();
}

function editAchat(id){openModalAchat(id);}

function deleteAchat(id){
  if(!confirm("Supprimer cette dépense?"))return;
  state.achats=state.achats.filter(a=>a.id!==id);
  saveToCloud();
  refreshMateriaux();
}


// ─── FACTURES SOUS-TRAITANTS ──────────────────────────────
function buildSstFactures(){
  const list=state.sstFactures.slice().sort((a,b)=>b.date.localeCompare(a.date));
  const total=list.reduce((s,a)=>s+(parseFloat(a.montant)||0),0);
  const parSst={};
  list.forEach(a=>{if(!parSst[a.sst])parSst[a.sst]=0;parSst[a.sst]+=(parseFloat(a.montant)||0);});

  const filtreChVal=window._filtreSstCh||'';
  const filtreSstVal=window._filtreSst||'';
  const filtreMoisVal=window._filtreSstMois||'';
  const filtered=list.filter(a=>{
    if(filtreChVal&&a.chantier!==filtreChVal)return false;
    if(filtreSstVal&&a.sst!==filtreSstVal)return false;
    if(filtreMoisVal&&!a.date.startsWith(filtreMoisVal))return false;
    return true;
  });

  const sstOpts='<option value="">-- Tous --</option>'+state.sstraitants.map(s=>`<option value="${esc(s.nom)}">${s.nom}</option>`).join('');
  const chOpts='<option value="">-- Tous les chantiers --</option>'+state.chantiers.map(c=>`<option value="${esc(c)}">${c}</option>`).join('');

  const rows=filtered.map(a=>`
    <div class="card" style="padding:10px 14px;margin-bottom:8px;">
      <div style="display:flex;justify-content:space-between;align-items:flex-start;gap:8px;">
        <div style="flex:1;">
          <div style="display:flex;align-items:center;gap:6px;flex-wrap:wrap;margin-bottom:4px;">
            <span style="font-size:13px;font-weight:600;">${a.sst||'—'}</span>
            <span style="font-size:11px;color:var(--secondary);">${a.date}</span>
          </div>
          <div style="display:flex;gap:6px;flex-wrap:wrap;margin-bottom:4px;">
            <span style="font-size:10px;background:#f0f0f0;padding:2px 7px;border-radius:20px;">🏗 ${a.chantier||'—'}</span>
            <span class="fbadge ${a.facturable?'fb-y':'fb-n'}">${a.facturable?'Facturable':'Non-fact.'}</span>
            ${a.depot?'<span style="font-size:10px;font-weight:600;padding:2px 7px;border-radius:20px;background:#FEF3C7;color:#92400E;">💰 Dépôt</span>':''}
          </div>
          ${a.description?`<div style="font-size:11px;color:var(--secondary);">${a.description}</div>`:''}
        </div>
        <div style="text-align:right;flex-shrink:0;">
          <div style="font-size:15px;font-weight:700;">${(parseFloat(a.montant)||0).toFixed(2)} $</div>
          <div style="display:flex;gap:4px;justify-content:flex-end;margin-top:4px;">
            <button class="btn-edit" onclick="editSstFacture(${a.id})">✏️</button>
            <button class="btn-del" onclick="deleteSstFacture(${a.id})">✕</button>
          </div>
        </div>
      </div>
    </div>`).join('');

  return`
    <div class="card">
      <div class="card-title">🧾 Factures sous-traitants</div>
      <div class="stats-row" style="margin-bottom:10px;">
        <div class="stat-box"><div class="label">Total</div><div class="value">${total.toFixed(2)} $</div></div>
        <div class="stat-box stat-fact"><div class="label">Factures</div><div class="value">${list.length}</div></div>
        <div class="stat-box stat-money"><div class="label">Filtrées</div><div class="value">${filtered.length}</div></div>
      </div>
      <button class="btn btn-primary" style="margin-bottom:12px;" onclick="openSstFactureModal()">+ Ajouter une facture SST</button>
      <div style="display:flex;gap:8px;flex-wrap:wrap;margin-bottom:12px;">
        <select style="flex:1;font-size:12px;" onchange="window._filtreSst=this.value;refreshSstFactures()">${sstOpts.replace('value="'+esc(filtreSstVal)+'"','value="'+esc(filtreSstVal)+'" selected')}</select>
        <select style="flex:1;font-size:12px;" onchange="window._filtreSstCh=this.value;refreshSstFactures()">${chOpts.replace('value="'+esc(filtreChVal)+'"','value="'+esc(filtreChVal)+'" selected')}</select>
        <input type="month" value="${filtreMoisVal}" onchange="window._filtreSstMois=this.value;refreshSstFactures()" style="flex:1;font-size:12px;color:var(--primary);"/>
        <button class="btn btn-sm" onclick="window._filtreSst='';window._filtreSstCh='';window._filtreSstMois='';refreshSstFactures()">↺</button>
      </div>
    </div>
    ${filtered.length?rows:'<div class="empty">Aucune facture trouvée.</div>'}`;
}

function refreshSstFactures(){
  const c=document.getElementById('content-facturation');
  if(c&&state.currentSub['facturation']==='sstfactures')c.innerHTML=buildSstFactures();
}

function calcTaxesSST(val){
  const montant=parseFloat(val)||0;
  const tps=montant*TPS;
  const tvq=montant*TVQ;
  const total=montant+tps+tvq;
  const elTPS=document.getElementById('sst-tps');
  const elTVQ=document.getElementById('sst-tvq');
  const elTotal=document.getElementById('sst-total');
  if(elTPS)elTPS.textContent=tps.toFixed(2)+' $';
  if(elTVQ)elTVQ.textContent=tvq.toFixed(2)+' $';
  if(elTotal)elTotal.textContent=total.toFixed(2)+' $';
}

function setSfFact(val){
  window._sfFacturable=val;
  const fy=document.getElementById('sf-fy'),fn=document.getElementById('sf-fn');
  if(fy&&fn){fy.className=val?'on-f':'';fn.className=!val?'on-nf':'';}
}

function saveSstFacture(editId){
  const date=document.getElementById('sf-date').value;
  const sst=document.getElementById('sf-sst').value;
  const chantier=document.getElementById('sf-ch').value;
  const montant=parseFloat(document.getElementById('sf-mont').value)||0;
  if(!date){alert("Veuillez entrer une date.");return;}
  if(!sst){alert("Veuillez choisir un sous-traitant.");return;}
  if(!montant){alert("Veuillez entrer un montant.");return;}
  const depotEl=document.getElementById('sf-depot');
  const facture={
    id:(editId&&editId!=='0')?parseInt(editId):++state.sstFactureId,
    date,sst,chantier,
    montant:montant.toFixed(2),
    description:document.getElementById('sf-desc').value.trim(),
    noFacture:document.getElementById('sf-no').value.trim(),
    facturable:window._sfFacturable,
    depot:depotEl?depotEl.checked:false
  };
  if(editId){const idx=state.sstFactures.findIndex(a=>a.id===editId);if(idx>=0)state.sstFactures[idx]=facture;}
  else state.sstFactures.push(facture);
  closeModal();saveToCloud();refreshSstFactures();
}

function deleteSstFacture(id){
  if(!confirm("Supprimer cette facture?"))return;
  state.sstFactures=state.sstFactures.filter(a=>a.id!==id);
  saveToCloud();refreshSstFactures();
}

function exporterDonnees(){
  const data={
    version:'1.0',
    date:new Date().toISOString(),
    entries:state.entries,
    chantiers:state.chantiers,
    typesTravaux:state.typesTravaux,
    fiches:state.fiches,
    clients:state.clients,
    empInfos:state.empInfos||{},tickets:state.tickets,ticketId:state.ticketId,suggestions:state.suggestions,suggestionId:state.suggestionId,
    entreprise:state.entreprise,
    sstraitants:state.sstraitants,
    fournisseurs:state.fournisseurs,
    factures:state.factures,
    achats:state.achats,
    sstFactures:state.sstFactures,
    entryId:state.entryId,
    tickets:state.tickets,
    suggestions:state.suggestions,
    ticketId:state.ticketId,
    suggestionId:state.suggestionId,
    factureId:state.factureId,
    achatId:state.achatId,
    sstFactureId:state.sstFactureId
  };
  const json=JSON.stringify(data,null,2);
  const blob=new Blob([json],{type:'application/json'});
  const url=URL.createObjectURL(blob);
  const a=document.createElement('a');
  const dateStr=new Date().toISOString().slice(0,10);
  a.href=url;
  a.download=`suivi-heures-backup-${dateStr}.json`;
  a.click();
  URL.revokeObjectURL(url);
  const now=new Date().toLocaleString('fr-CA',{day:'numeric',month:'long',year:'numeric',hour:'2-digit',minute:'2-digit'});
  localStorage.setItem('sh_last_backup',now);
  renderReglages();
  alert("✅ Données exportées! Sauvegarde le fichier sur Google Drive ou iCloud.");
}

function importerDonnees(input){
  const file=input.files[0];
  if(!file)return;
  const reader=new FileReader();
  reader.onload=function(e){
    try{
      const data=JSON.parse(e.target.result);
      if(!data.entries||!data.chantiers){alert("❌ Fichier invalide. Assure-toi d'utiliser un fichier exporté depuis cette app.");return;}
      if(!confirm("⚠️ Cette action va remplacer TOUTES tes données. Es-tu certain?"))return;
      if(data.entries)state.entries=data.entries;
      if(data.chantiers)state.chantiers=data.chantiers;
      if(data.typesTravaux)state.typesTravaux=data.typesTravaux;
      if(data.fiches)state.fiches=data.fiches;
      if(data.clients)state.clients=data.clients;
      if(data.empInfos)state.empInfos=data.empInfos;
      if(data.entreprise)state.entreprise=data.entreprise;
      if(data.sstraitants)state.sstraitants=data.sstraitants;
      if(data.fournisseurs)state.fournisseurs=data.fournisseurs;
      if(data.factures)state.factures=data.factures;
      if(data.achats)state.achats=data.achats;
      if(data.sstFactures)state.sstFactures=data.sstFactures;
      if(data.entryId)state.entryId=data.entryId;
      if(data.factureId)state.factureId=data.factureId;
      if(data.achatId)state.achatId=data.achatId;
      if(data.sstFactureId)state.sstFactureId=data.sstFactureId;
      if(data.tickets)state.tickets=data.tickets;
      if(data.ticketId)state.ticketId=data.ticketId;
      if(data.suggestions)state.suggestions=data.suggestions;
      if(data.suggestionId)state.suggestionId=data.suggestionId;
      saveToCloud();
      alert("✅ Données restaurées avec succès!");
      renderReglages();
    }catch(err){
      alert("❌ Erreur lors de la lecture du fichier: "+err.message);
    }
  };
  reader.readAsText(file);
}

function ouvrirModalTicket(type){
  const isTicket=type==='ticket';
  const empOpts=EMPLOYES_LISTE.map(e=>`<option value="${e}">${e}</option>`).join('');
  const prioOpts=PRIORITES.map(p=>`<option value="${p}">${p}</option>`).join('');
  document.getElementById('modalBox').innerHTML=`
    <div class="modal-header">
      <h3>${isTicket?'🐛 Signaler un problème':'💡 Suggérer une amélioration'}</h3>
      <button class="modal-close" onclick="closeModal()">×</button>
    </div>
    <div class="field"><label>Titre</label>
      <input type="text" id="tk-titre" placeholder="Titre du problème ou de l&#39;idée..."/>
    </div>
    <div class="field"><label>Description</label>
      <textarea id="tk-desc" placeholder="Décris en détail..." style="width:100%;border:1px solid var(--border);border-radius:var(--radius-sm);padding:10px;font-size:13px;min-height:80px;"></textarea>

    </div>
    <button class="btn btn-primary" onclick="sauvegarderTicket('${type}')">✓ Enregistrer</button>`;
  document.getElementById('modalOverlay').classList.add('open');
  setTimeout(()=>{const t=document.getElementById('tk-titre');if(t)t.focus();},300);
}

function sauvegarderTicket(type){
  const titre=document.getElementById('tk-titre').value.trim();
  if(!titre){alert("Veuillez entrer un titre.");return;}
  const item={
    id:type==='ticket'?++state.ticketId:++state.suggestionId,
    titre,
    description:document.getElementById('tk-desc').value.trim(),
    auteur:document.getElementById('tk-auteur').value,
    priorite:type==='ticket'?(document.getElementById('tk-prio')?document.getElementById('tk-prio').value:'🟡 Bas'):'',
    date:new Date().toLocaleDateString('fr-CA',{day:'numeric',month:'long',year:'numeric'}),
    statut:'ouvert',
    dateFait:''
  };
  if(type==='ticket')state.tickets.push(item);
  else state.suggestions.push(item);
  closeModal();
  saveToCloud();
  window._reglagesSub=type==='ticket'?'problemes':'suggestions';
  // Force re-render after save
  setTimeout(()=>renderReglages(),100);
}

function marquerFaitTicket(id,type){
  const list=type==='ticket'?state.tickets:state.suggestions;
  const item=list.find(t=>t.id===id);
  if(item){
    if(item.statut==='fait'){
      // Toggle back to open
      item.statut='ouvert';
      item.dateFait='';
    } else {
      item.statut='fait';
      item.dateFait=new Date().toLocaleDateString('fr-CA',{day:'numeric',month:'long',year:'numeric'});
    }
    saveToCloud();
    renderReglages();
  }
}

function supprimerTicket(id,type){
  if(!confirm("Supprimer cet élément?"))return;
  if(type==='ticket')state.tickets=state.tickets.filter(t=>t.id!==id);
  else state.suggestions=state.suggestions.filter(s=>s.id!==id);
  saveToCloud();
  renderReglages();
}


// ─── TABLEAU DE BORD ──────────────────────────────────────
function buildDashboard(){
  const c=document.getElementById('content-rapport');
  if(!c)return;
  const today=new Date();
  const moisDebut=new Date(today.getFullYear(),today.getMonth(),1);
  const moisFin=new Date(today.getFullYear(),today.getMonth()+1,0,23,59,59);
  const semaineDebut=new Date(today);
  semaineDebut.setDate(today.getDate()-(today.getDay()||7)+1);
  semaineDebut.setHours(0,0,0,0);

  // Heures ce mois
  let hMois=0,hMoisFact=0;
  Object.keys(EMPS).forEach(emp=>{
    state.entries[emp].forEach(en=>{
      const d=new Date(en.date+'T12:00:00');
      if(d>=moisDebut&&d<=moisFin){hMois+=en.heures;if(en.facturable)hMoisFact+=en.heures;}
    });
  });

  // Heures cette semaine
  let hSemaine=0;
  Object.keys(EMPS).forEach(emp=>{
    state.entries[emp].forEach(en=>{
      const d=new Date(en.date+'T12:00:00');
      if(d>=semaineDebut&&d<=today)hSemaine+=en.heures;
    });
  });

  // Montant à facturer ce mois (heures facturables × taux)
  let montantMois=0;
  const hParCh={};
  Object.keys(EMPS).forEach(emp=>{
    state.entries[emp].filter(en=>{const d=new Date(en.date+'T12:00:00');return en.facturable&&d>=moisDebut&&d<=moisFin;}).forEach(en=>{
      if(!hParCh[en.chantier])hParCh[en.chantier]=0;hParCh[en.chantier]+=en.heures;
    });
  });
  Object.entries(hParCh).forEach(([ch,h])=>{const m=calcMontant(h,ch);if(m)montantMois+=m;});

  // Factures en attente
  const facturesEnvoyees=state.factures.filter(f=>f.statut==='envoye');
  const totalEnAttente=facturesEnvoyees.reduce((s,f)=>s+f.grandTotal,0);
  const facturesBrouillon=state.factures.filter(f=>f.statut==='brouillon');

  // Heures par employé ce mois
  const hEmp={};
  Object.entries(EMPS).forEach(([empKey,e])=>{
    let h=0;
    state.entries[empKey].forEach(en=>{const d=new Date(en.date+'T12:00:00');if(d>=moisDebut&&d<=moisFin)h+=en.heures;});
    hEmp[empKey]={h,label:e.label,col:e.col,bg:e.bg};
  });
  const maxH=Math.max(...Object.values(hEmp).map(v=>v.h),1);

  // Heures par chantier ce mois
  const hCh={};
  Object.keys(EMPS).forEach(emp=>{
    state.entries[emp].forEach(en=>{const d=new Date(en.date+'T12:00:00');if(d>=moisDebut&&d<=moisFin){if(!hCh[en.chantier||'—'])hCh[en.chantier||'—']=0;hCh[en.chantier||'—']+=en.heures;}});
  });
  const topCh=Object.entries(hCh).sort((a,b)=>b[1]-a[1]).slice(0,5);
  const maxCh=topCh.length?topCh[0][1]:1;

  // ── ANALYSE ANTI-OUBLI ──
  const chantierAlerts=[];
  state.chantiers.forEach(chantier=>{
    const fiche=state.fiches[chantier]||{};
    const taux=parseFloat(fiche.taux)||0;
    const entreesFact=[];
    Object.keys(EMPS).forEach(emp=>{
      state.entries[emp].filter(en=>en.chantier===chantier&&en.facturable&&en.heures>0).forEach(en=>entreesFact.push({...en,emp}));
    });
    const sstFact=state.sstFactures.filter(a=>a.chantier===chantier&&a.facturable===true);
    const achatsFact=state.achats.filter(a=>a.chantier===chantier&&a.facturable===true);
    if(!entreesFact.length&&!sstFact.length&&!achatsFact.length)return;
    const factsCh=state.factures.filter(f=>f.chantier===chantier&&(f.statut==='envoye'||f.statut==='paye'));
    const nonCouvertsH=entreesFact.filter(en=>{
      return!factsCh.some(f=>{
        if(!f.dateDebut||!f.dateFin)return false;
        const d=new Date(en.date+'T12:00:00');
        return d>=new Date(f.dateDebut+'T00:00:00')&&d<=new Date(f.dateFin+'T23:59:59');
      });
    });
    const nonCouvertsSST=sstFact.filter(a=>{
      return!factsCh.some(f=>{
        if(!f.dateDebut||!f.dateFin)return false;
        const d=new Date(a.date+'T12:00:00');
        return d>=new Date(f.dateDebut+'T00:00:00')&&d<=new Date(f.dateFin+'T23:59:59');
      });
    });
    const nonCouvertsMat=achatsFact.filter(a=>{
      return!factsCh.some(f=>{
        const md1=f.matDateDebut||f.dateDebut;
        const md2=f.matDateFin||f.dateFin;
        if(!md1||!md2)return false;
        const d=new Date(a.date+'T12:00:00');
        return d>=new Date(md1+'T00:00:00')&&d<=new Date(md2+'T23:59:59');
      });
    });
    if(!nonCouvertsH.length&&!nonCouvertsSST.length&&!nonCouvertsMat.length)return;
    const hNonFact=nonCouvertsH.reduce((s,en)=>s+en.heures,0);
    const montantMdoNon=taux>0?hNonFact*taux:0;
    const montantSSTNon=nonCouvertsSST.reduce((s,a)=>s+(parseFloat(a.montant)||0),0);
    const montantMatNon=nonCouvertsMat.reduce((s,a)=>s+(parseFloat(a.montantAvantTax)||0),0);
    const totalNon=montantMdoNon+montantSSTNon+montantMatNon;
    const datesNon=[...nonCouvertsH.map(e=>e.date),...nonCouvertsSST.map(a=>a.date),...nonCouvertsMat.map(a=>a.date)].sort();
    chantierAlerts.push({chantier,hNonFact,montantMdoNon,montantSSTNon,montantMatNon,totalNon,
      dateMin:datesNon[0],dateMax:datesNon[datesNon.length-1],
      nbEntrees:nonCouvertsH.length,nbSST:nonCouvertsSST.length,nbMat:nonCouvertsMat.length});
  });
  const totalNonFacture=chantierAlerts.reduce((s,a)=>s+a.totalNon,0);

  // Alertes standard
  const alertes=[];
  if(facturesBrouillon.length)alertes.push({type:'warn',msg:`${facturesBrouillon.length} facture${facturesBrouillon.length>1?'s':''} en brouillon non envoyée${facturesBrouillon.length>1?'s':''}`});
  if(facturesEnvoyees.length)alertes.push({type:'info',msg:`${facturesEnvoyees.length} facture${facturesEnvoyees.length>1?'s':''} envoyée${facturesEnvoyees.length>1?'s':''} en attente de paiement — ${totalEnAttente.toFixed(2)} $`});
  const moisNom=today.toLocaleDateString('fr-CA',{month:'long',year:'numeric'});

  c.innerHTML=`
    <div style="font-size:14px;font-weight:600;margin-bottom:12px;color:var(--secondary);">📊 Tableau de bord — ${moisNom.charAt(0).toUpperCase()+moisNom.slice(1)}</div>

    ${chantierAlerts.length?`
    <div style="background:#FEF3C7;border:1.5px solid #F59E0B;border-radius:var(--radius);padding:14px;margin-bottom:12px;">
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:10px;flex-wrap:wrap;gap:8px;">
        <div style="font-size:13px;font-weight:700;color:#92400E;">🚨 Éléments facturables non couverts</div>
        ${totalNonFacture>0?`<div style="background:#92400E;color:#fff;border-radius:20px;padding:4px 12px;font-size:13px;font-weight:700;">${totalNonFacture.toFixed(2)} $</div>`:''}
      </div>
      ${chantierAlerts.map(a=>`
        <div style="background:#fff;border-radius:var(--radius-sm);padding:10px 12px;margin-bottom:8px;border:1px solid #F59E0B;">
          <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:4px;flex-wrap:wrap;gap:4px;">
            <div style="font-size:13px;font-weight:700;">🏗 ${a.chantier}</div>
            ${a.totalNon>0?`<div style="font-size:13px;font-weight:700;color:#92400E;">${a.totalNon.toFixed(2)} $</div>`:''}
          </div>
          <div style="font-size:11px;color:#666;margin-bottom:6px;">Période : ${a.dateMin} → ${a.dateMax}</div>
          <div style="display:flex;gap:6px;flex-wrap:wrap;">
            ${a.hNonFact>0?`<span style="font-size:11px;background:#E6F1FB;color:#0C447C;padding:2px 8px;border-radius:20px;font-weight:600;">👷 ${a.hNonFact.toFixed(1)}h${a.montantMdoNon>0?' = '+a.montantMdoNon.toFixed(0)+' $':''}</span>`:''}
            ${a.montantSSTNon>0?`<span style="font-size:11px;background:#E1F5EE;color:#085041;padding:2px 8px;border-radius:20px;font-weight:600;">🔧 SST ${a.montantSSTNon.toFixed(0)} $</span>`:''}
            ${a.montantMatNon>0?`<span style="font-size:11px;background:#FAEEDA;color:#633806;padding:2px 8px;border-radius:20px;font-weight:600;">🪵 Mat. ${a.montantMatNon.toFixed(0)} $</span>`:''}
          </div>
          <button onclick="preFillFacture('${a.chantier}','${a.dateMin}','${a.dateMax}')" style="margin-top:8px;width:100%;padding:7px;background:#0C447C;color:#fff;border:none;border-radius:var(--radius-sm);font-size:12px;font-weight:600;cursor:pointer;">➕ Créer la facture pour cette période</button>
        </div>`).join('')}
    </div>`:'<div style="background:#EAF3DE;border-left:3px solid #27500A;padding:10px 12px;border-radius:var(--radius-sm);font-size:12px;margin-bottom:12px;color:#27500A;">✅ Tous les éléments facturables sont couverts par une facture.</div>'}

    ${alertes.length?`<div style="margin-bottom:12px;">${alertes.map(a=>`
      <div style="background:${a.type==='warn'?'#FEF3C7':'#E6F1FB'};border-left:3px solid ${a.type==='warn'?'#F59E0B':'#185FA5'};padding:10px 12px;border-radius:var(--radius-sm);font-size:12px;margin-bottom:6px;color:${a.type==='warn'?'#92400E':'#0C447C'};">
        ${a.type==='warn'?'⚠️':'ℹ️'} ${a.msg}
      </div>`).join('')}</div>`:''}

    <div class="stats-row-4" style="margin-bottom:16px;">
      <div class="stat-box"><div class="label">Heures cette semaine</div><div class="value">${hSemaine.toFixed(1)}h</div></div>
      <div class="stat-box stat-fact"><div class="label">Heures ce mois</div><div class="value">${hMois.toFixed(1)}h</div></div>
      <div class="stat-box stat-money"><div class="label">💰 À facturer ce mois</div><div class="value">${montantMois>0?montantMois.toFixed(0)+' $':'—'}</div></div>
      <div class="stat-box stat-nf"><div class="label">En attente paiement</div><div class="value">${totalEnAttente>0?totalEnAttente.toFixed(0)+' $':'—'}</div></div>
    </div>

    <div style="display:grid;grid-template-columns:repeat(auto-fit,minmax(280px,1fr));gap:12px;margin-bottom:12px;">
      <div class="card">
        <div class="card-title">👷 Heures par employé ce mois</div>
        ${Object.entries(hEmp).map(([k,v])=>`
          <div style="margin-bottom:10px;">
            <div style="display:flex;justify-content:space-between;margin-bottom:4px;">
              <span style="font-size:12px;font-weight:500;color:${v.col};">${v.label}</span>
              <span style="font-size:12px;font-weight:600;">${v.h.toFixed(1)}h</span>
            </div>
            <div style="background:#f0f0f0;border-radius:20px;height:8px;overflow:hidden;">
              <div style="background:${v.col};height:100%;width:${v.h>0?Math.round(v.h/maxH*100):0}%;border-radius:20px;transition:width 0.5s;"></div>
            </div>
          </div>`).join('')}
      </div>

      <div class="card">
        <div class="card-title">🏗 Heures par chantier ce mois</div>
        ${topCh.length?topCh.map(([ch,h])=>`
          <div style="margin-bottom:10px;">
            <div style="display:flex;justify-content:space-between;margin-bottom:4px;">
              <span style="font-size:12px;font-weight:500;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;max-width:160px;">${ch}</span>
              <span style="font-size:12px;font-weight:600;">${h.toFixed(1)}h</span>
            </div>
            <div style="background:#f0f0f0;border-radius:20px;height:8px;overflow:hidden;">
              <div style="background:#185FA5;height:100%;width:${Math.round(h/maxCh*100)}%;border-radius:20px;"></div>
            </div>
          </div>`).join(''):'<div class="empty" style="padding:10px 0;">Aucune heure ce mois.</div>'}
      </div>
    </div>

    <div class="card">
      <div class="card-title">🧾 Dernières factures</div>
      ${state.factures.slice(0,5).map(f=>`
        <div style="display:flex;justify-content:space-between;align-items:center;padding:8px 0;border-bottom:0.5px solid var(--border);">
