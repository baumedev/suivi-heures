<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="Suivi Heures">
<meta name="theme-color" content="#ffffff">
<title>Suivi des heures</title>
<style>
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;margin:0;padding:0;background:#f5f5f5;color:#1a1a1a;font-size:15px;}
:root{--primary:#1a1a1a;--secondary:#6b6b6b;--border:#e0e0e0;--radius:10px;--radius-sm:6px;}
.top-nav{background:#fff;border-bottom:1px solid var(--border);display:flex;overflow-x:auto;-webkit-overflow-scrolling:touch;scrollbar-width:none;position:sticky;top:0;z-index:100;}
@media(min-width:900px){
  .content{padding:16px 32px;}
  .stats-row{grid-template-columns:repeat(4,1fr);}
  .grid2{grid-template-columns:1fr 1fr;}
}
@media(min-width:1200px){
  .content{padding:16px 56px;}
  .stats-row{grid-template-columns:repeat(5,1fr);}
}

}
.top-nav::-webkit-scrollbar{display:none;}
.top-nav button{background:none;border:none;border-bottom:3px solid transparent;padding:14px 16px;font-size:13px;font-weight:500;color:var(--secondary);white-space:nowrap;cursor:pointer;display:flex;align-items:center;gap:6px;}
.top-nav button.active{color:var(--primary);border-bottom-color:var(--primary);}
.top-nav button.tab-victor.active{color:#0C447C;border-bottom-color:#185FA5;}
.top-nav button.tab-edouard.active{color:#085041;border-bottom-color:#0F6E56;}
.top-nav button.tab-denis.active{color:#633806;border-bottom-color:#854F0B;}
.top-nav button.tab-guewenn.active{color:#6B21A8;border-bottom-color:#9333EA;}
.top-nav button.tab-rapport.active{color:#3C3489;border-bottom-color:#534AB7;}
.avatar{width:24px;height:24px;border-radius:50%;display:inline-flex;align-items:center;justify-content:center;font-size:10px;font-weight:600;}
.av-v{background:#E6F1FB;color:#0C447C;}
.av-e{background:#E1F5EE;color:#085041;}
.av-d{background:#FAEEDA;color:#633806;}
.av-g{background:#F3E8FF;color:#6B21A8;}
.sub-nav{background:#fff;border-bottom:1px solid var(--border);display:flex;overflow-x:auto;-webkit-overflow-scrolling:touch;scrollbar-width:none;}
.sub-nav::-webkit-scrollbar{display:none;}
.sub-nav button{background:none;border:none;border-bottom:2px solid transparent;padding:10px 14px;font-size:12px;color:var(--secondary);white-space:nowrap;cursor:pointer;}
.sub-nav button.active{color:var(--primary);border-bottom-color:var(--primary);font-weight:500;}
.page{display:none;}.page.active{display:block;}
.content{padding:16px;padding-bottom:calc(24px + env(safe-area-inset-bottom));}
.card{background:#fff;border-radius:var(--radius);border:1px solid var(--border);padding:16px;margin-bottom:12px;}
.card-title{font-size:14px;font-weight:600;margin:0 0 12px;display:flex;align-items:center;gap:6px;}
.stats-row{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:16px;}
.stats-row-4{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin-bottom:16px;}
.stat-box{background:#f9f9f9;border-radius:var(--radius-sm);padding:10px;text-align:center;border:1px solid var(--border);}
.stat-box .label{font-size:10px;color:var(--secondary);margin:0 0 3px;}
.stat-box .value{font-size:16px;font-weight:600;margin:0;}
.stat-fact{background:#EAF3DE;border-color:#C0DD97;}.stat-fact .label{color:#3B6D11;}.stat-fact .value{color:#27500A;}
.stat-nf{background:#FCEBEB;border-color:#F09595;}.stat-nf .label{color:#A32D2D;}.stat-nf .value{color:#791F1F;}
.stat-money{background:#E6F1FB;border-color:#85B7EB;}.stat-money .label{color:#185FA5;}.stat-money .value{color:#0C447C;}
.cal-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:12px;}
.cal-header h2{font-size:16px;font-weight:600;margin:0;}
.cal-nav button{background:#f0f0f0;border:none;border-radius:var(--radius-sm);width:36px;height:36px;font-size:16px;cursor:pointer;}
.cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:3px;}
.cal-day-name{text-align:center;font-size:10px;font-weight:600;color:var(--secondary);padding:4px 0;}
.cal-cell{border:1px solid var(--border);border-radius:6px;padding:4px 3px;min-height:52px;cursor:pointer;text-align:center;background:#fff;}
.cal-cell:active{background:#f0f0f0;}
.cal-cell.empty{background:none;border-color:transparent;cursor:default;}
.cal-cell.today{background:#f0f4ff;}
.cal-cell.has-data{border-width:2px;}
.day-num{font-size:12px;font-weight:600;}
.day-h{font-size:10px;font-weight:600;margin-top:2px;}
.day-f{font-size:9px;margin-top:1px;}
.modal-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.5);z-index:200;overflow-y:auto;}
.modal-overlay.open{display:flex;align-items:flex-end;justify-content:center;}
.modal-box{background:#fff;border-radius:18px 18px 0 0;padding:20px;width:100%;max-width:500px;max-height:90vh;overflow-y:auto;}
@media(min-width:500px){.modal-overlay.open{align-items:center;}.modal-box{border-radius:18px;margin:16px;}}
.modal-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:16px;}
.modal-header h3{font-size:15px;font-weight:600;margin:0;text-transform:capitalize;}
.modal-close{background:none;border:none;font-size:22px;color:var(--secondary);cursor:pointer;padding:0;}
.entry-item{display:flex;align-items:center;gap:8px;padding:8px 0;border-bottom:1px solid var(--border);}
.entry-item:last-child{border-bottom:none;}
.entry-h{font-size:13px;font-weight:700;min-width:34px;}
.entry-info{flex:1;overflow:hidden;}
.entry-info .e1{font-size:12px;font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.entry-info .e2{font-size:11px;color:var(--secondary);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.btn-del{background:none;border:none;color:#ccc;font-size:16px;cursor:pointer;padding:4px;}
.btn-del:active{color:#e24b4a;}
.btn-edit{background:none;border:none;color:#888;font-size:14px;cursor:pointer;padding:4px;}
.btn-edit:active{color:#185FA5;}
.fbadge{font-size:10px;font-weight:600;padding:2px 7px;border-radius:20px;flex-shrink:0;}
.fb-y{background:#EAF3DE;color:#27500A;}
.fb-n{background:#FCEBEB;color:#791F1F;}
.form-section{border-top:1px solid var(--border);padding-top:14px;margin-top:4px;}
.form-section h4{font-size:12px;font-weight:600;color:var(--secondary);letter-spacing:.05em;margin:0 0 12px;}
.field{margin-bottom:12px;}
.field label{display:block;font-size:11px;color:var(--secondary);margin-bottom:4px;font-weight:500;}
.field input,.field select{width:100%;border:1px solid var(--border);border-radius:var(--radius-sm);padding:10px 12px;font-size:14px;background:#fff;color:var(--primary);-webkit-appearance:none;}
.field input:focus,.field select:focus{outline:none;border-color:#888;}
.grid2{display:grid;grid-template-columns:1fr 1fr;gap:10px;}
.toggle-group{display:flex;border:1px solid var(--border);border-radius:var(--radius-sm);overflow:hidden;margin-bottom:12px;}
.toggle-group button{flex:1;padding:10px;font-size:13px;font-weight:500;border:none;background:#fff;color:var(--secondary);cursor:pointer;}
.toggle-group button.on-f{background:#EAF3DE;color:#27500A;}
.toggle-group button.on-nf{background:#FCEBEC;color:#791F1F;}
.btn{display:inline-flex;align-items:center;justify-content:center;gap:6px;padding:12px 20px;border-radius:var(--radius-sm);border:none;font-size:14px;font-weight:600;cursor:pointer;}
.btn-primary{background:#1a1a1a;color:#fff;width:100%;}
.btn-sm{padding:8px 14px;font-size:12px;background:#f0f0f0;color:var(--primary);border:1px solid var(--border);cursor:pointer;border-radius:var(--radius-sm);}
.btn-pdf{background:#0C447C;color:#fff;border:none;border-radius:var(--radius-sm);padding:10px 18px;font-size:13px;font-weight:600;cursor:pointer;display:inline-flex;align-items:center;gap:6px;}
.list-item{display:flex;align-items:center;gap:8px;padding:10px 0;border-bottom:1px solid var(--border);}
.list-item:last-child{border-bottom:none;}
.li-date{font-size:11px;color:var(--secondary);min-width:70px;}
.li-h{font-size:13px;font-weight:700;min-width:34px;}
.li-info{flex:1;overflow:hidden;}
.li-info .t1{font-size:13px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.li-info .t2{font-size:11px;color:var(--secondary);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.rp-result-header{background:#f0f0f0;border-radius:var(--radius-sm);padding:12px;margin-bottom:12px;}
.emp-result-card{border-left:4px solid #ddd;padding-left:12px;margin-bottom:14px;}
.emp-result-card.ev{border-left-color:#185FA5;}
.emp-result-card.ee{border-left-color:#0F6E56;}
.emp-result-card.ed{border-left-color:#854F0B;}
.mini-table{width:100%;border-collapse:collapse;font-size:12px;margin-bottom:6px;}
.mini-table td{padding:4px 0;border-bottom:1px solid var(--border);}
.mini-table td:last-child{text-align:right;}
.mini-table tr:last-child td{border-bottom:none;}
.section-label{font-size:10px;font-weight:600;color:var(--secondary);letter-spacing:.05em;margin:10px 0 6px;}
details summary{font-size:12px;color:var(--secondary);cursor:pointer;padding:6px 0;}
.tag{display:inline-flex;align-items:center;gap:5px;background:#f0f0f0;border:1px solid var(--border);border-radius:20px;padding:4px 10px;font-size:12px;margin:3px;}
.tag button{background:none;border:none;cursor:pointer;color:var(--secondary);font-size:13px;padding:0;}
.fiche-section{border-top:1px solid var(--border);padding-top:12px;margin-top:12px;}
.empty{text-align:center;padding:40px 20px;color:var(--secondary);font-size:13px;}
.total-facture-bar{background:#0C447C;color:#fff;border-radius:var(--radius-sm);padding:14px 16px;display:flex;justify-content:space-between;align-items:center;margin-bottom:16px;}
.total-facture-bar .tf-label{font-size:13px;font-weight:500;opacity:0.85;}
.total-facture-bar .tf-value{font-size:22px;font-weight:700;}
.sync-bar{display:flex;align-items:center;justify-content:center;gap:6px;padding:6px;font-size:11px;background:#f0f0f0;border-bottom:1px solid var(--border);}
.sync-dot{width:8px;height:8px;border-radius:50%;background:#ccc;flex-shrink:0;}
.sync-dot.syncing{background:#EF9F27;animation:pulse 1s infinite;}
.sync-dot.ok{background:#639922;}
.sync-dot.err{background:#E24B4A;}
@keyframes pulse{0%,100%{opacity:1;}50%{opacity:0.3;}}
.login-screen{position:fixed;inset:0;background:linear-gradient(135deg,#1a1a2e 0%,#0C447C 100%);display:flex;align-items:center;justify-content:center;z-index:9999;padding:20px;}
.login-box{background:#fff;border-radius:18px;padding:32px 24px;width:100%;max-width:360px;box-shadow:0 20px 60px rgba(0,0,0,0.3);}
.login-logo{text-align:center;margin-bottom:24px;}
.login-logo .logo-icon{font-size:48px;display:block;margin-bottom:8px;}
.login-logo h1{font-size:20px;font-weight:700;margin:0;color:#1a1a1a;}
.login-logo p{font-size:13px;color:var(--secondary);margin:4px 0 0;}
.login-error{background:#FCEBEB;color:#791F1F;border-radius:var(--radius-sm);padding:10px 12px;font-size:13px;margin-bottom:12px;display:none;}
.logout-btn{background:none;border:1px solid var(--border);border-radius:var(--radius-sm);padding:6px 12px;font-size:12px;cursor:pointer;color:var(--secondary);}
.logout-btn:hover{background:#f0f0f0;}
.tab-heures.active{color:#1a1a1a;border-bottom-color:#1a1a1a;}
.tab-reglages.active{color:#534AB7;border-bottom-color:#534AB7;}
.cal-cell.selecting{background:#E6F1FB!important;border-color:#185FA5!important;border-width:2px!important;}
.cal-cell.selected{background:#EAF3DE!important;border-color:#27500A!important;border-width:2px!important;}
.drag-hint{font-size:10px;color:var(--secondary);text-align:center;padding:4px 0;margin-bottom:4px;}
.tab-facturation.active{color:#1a6b3a;border-bottom-color:#2ea15a;}
.tab-entreprise.active{color:#6b3a1a;border-bottom-color:#a15a2e;}
.facture-section{background:#f9f9f9;border-radius:var(--radius-sm);padding:12px;margin-bottom:12px;border:1px solid var(--border);}
.facture-section-title{font-size:12px;font-weight:700;color:var(--secondary);letter-spacing:.05em;margin:0 0 10px;display:flex;align-items:center;gap:6px;}
.facture-line{display:flex;align-items:center;gap:8px;padding:6px 0;border-bottom:1px solid var(--border);}
.facture-line:last-child{border-bottom:none;}
.facture-total-row{display:flex;justify-content:space-between;align-items:center;padding:6px 0;font-size:13px;}
.facture-total-row.grand{font-size:16px;font-weight:700;border-top:2px solid var(--primary);margin-top:6px;padding-top:10px;}
.facture-grand-total{background:#0C447C;color:#fff;border-radius:var(--radius-sm);padding:16px;display:flex;justify-content:space-between;align-items:center;margin-top:12px;}
.historique-item{display:flex;align-items:center;gap:10px;padding:10px 0;border-bottom:1px solid var(--border);cursor:pointer;}
.historique-item:last-child{border-bottom:none;}
.hist-num{font-size:11px;font-weight:700;color:#0C447C;min-width:50px;}
.hist-info{flex:1;}
.hist-info .h1{font-size:13px;font-weight:500;}
.hist-info .h2{font-size:11px;color:var(--secondary);}
.hist-montant{font-size:14px;font-weight:700;color:#0C447C;}
.statut-badge{font-size:10px;font-weight:600;padding:2px 8px;border-radius:20px;}
.statut-brouillon{background:#f0f0f0;color:#666;}
.statut-envoye{background:#E6F1FB;color:#0C447C;}
.statut-paye{background:#EAF3DE;color:#27500A;}
.logo-preview{width:100px;height:60px;object-fit:contain;border-radius:6px;border:1px solid var(--border);}
@media print{
.top-nav,.sub-nav,.sync-bar,.no-print,.login-screen{display:none!important;}
body{background:#fff;font-size:11px;}
.page{display:block!important;}
.content{padding:0;max-width:100%;}
.card{break-inside:avoid;border:none;padding:8px 0;}
.btn-pdf,.btn-del,.btn-edit{display:none!important;}
.facture-grand-total{-webkit-print-color-adjust:exact;print-color-adjust:exact;}
.modal-overlay{display:none!important;}
}
</style>
</head>
<body>

<div class="login-screen" id="loginScreen">
  <div class="login-box">
    <div class="login-logo">
      <span class="logo-icon">🏗</span>
      <h1>Suivi des heures</h1>
      <p>Connecte-toi pour continuer</p>
    </div>
    <div class="login-error" id="loginError">Nom d'utilisateur ou mot de passe incorrect.</div>
    <div class="field"><label>Utilisateur</label>
      <input type="text" id="login-user" placeholder="Ton nom utilisateur" autocomplete="username" autocapitalize="none"/>
    </div>
    <div class="field"><label>Mot de passe</label>
      <input type="password" id="login-pass" placeholder="Mot de passe" autocomplete="current-password" onkeydown="if(event.key==String.fromCharCode(13))doLogin()"/>
    </div>
    <button class="btn btn-primary" onclick="doLogin()" style="margin-top:4px;">Se connecter →</button>
    <p style="font-size:11px;color:var(--secondary);text-align:center;margin:12px 0 0;">Contacte l'administrateur si tu as oublié ton mot de passe.</p>
  </div>
</div>

<div id="app">
<div class="sync-bar" id="syncBar">

  <button class="logout-btn" id="logoutBtn" style="display:none;margin-left:8px;" onclick="doLogout()">Déconnexion</button>
</div>

<nav class="top-nav">

  <div class="content" id="content-reglages"></div>
</div>

  <nav class="sub-nav">
    <button class="active" onclick="setSub('facturation','courantes')">📝 En cours</button>

  <div class="content" id="content-entreprise"></div>
</div>

</div>

function setHeuresEmp(emp){
  currentHeuresEmp=emp;
  state.currentEmp=emp;
  // Update employee sub-nav
  const btns=document.querySelectorAll('#heures-subnav button');
  const emps=['victor','edouard','denis','guewenn'];
  btns.forEach((b,i)=>b.classList.toggle('active',emps[i]===emp));
  // Update action sub-nav
  const sub=state.currentSub[emp]||'cal';
  const btns2=document.querySelectorAll('#heures-sub2nav button');
  const subs=['cal','liste','rapport'];
  btns2.forEach((b,i)=>b.classList.toggle('active',subs[i]===sub));
  // Render content
  const c=document.getElementById('content-heures');
  if(!c)return;
  if(sub==='cal')c.innerHTML=buildCal(emp);
  else if(sub==='liste')c.innerHTML=buildListe(emp);
  else c.innerHTML=buildRapportEmp(emp);
}

// ─── SYNC STATUS ─────────────────────────────────────────
function setSyncStatus(s,msg){
  document.getElementById('syncDot').className='sync-dot '+s;
  document.getElementById('syncText').textContent=msg;
}

// ─── SUPABASE LOAD ────────────────────────────────────────
async function loadFromCloud(){
  try{
    setSyncStatus('syncing','Chargement...');
    const controller=new AbortController();
    const timeout=setTimeout(()=>controller.abort(),10000);
    const r=await fetch(`${SB_URL}/rest/v1/donnees?id=eq.${ROW_ID}&select=data`,{
      headers:SB_HEADERS,
      signal:controller.signal
    });
    clearTimeout(timeout);
    if(!r.ok){
      const errText=await r.text();
      throw new Error('HTTP '+r.status+': '+errText);
    }
    const rows=await r.json();
    if(rows.length>0&&rows[0].data){
      const d=rows[0].data;
      if(d.entries){
        state.entries=d.entries;
        // Ensure all EMPS have entries array
        Object.keys(EMPS).forEach(k=>{if(!state.entries[k])state.entries[k]=[];});
      }
      if(d.chantiers)state.chantiers=d.chantiers;
      if(d.typesTravaux)state.typesTravaux=d.typesTravaux;
      if(d.fiches)state.fiches=d.fiches;
      if(d.entryId)state.entryId=d.entryId;
    } else {
      // First time — insert empty row
      await fetch(`${SB_URL}/rest/v1/donnees`,{method:'POST',headers:{...SB_HEADERS,'Prefer':'return=minimal'},body:JSON.stringify({id:ROW_ID,data:getCloudPayload()})});
    }
    state.chantiers.forEach(c=>{if(!state.fiches[c])state.fiches[c]={};});
    saveLocal();
    const t=new Date().toLocaleTimeString('fr-CA',{hour:'2-digit',minute:'2-digit'});
    setSyncStatus('ok',`Synchronisé à ${t}`);
    // NEVER re-render from background sync — only update data silently
  }catch(e){
    console.error('Supabase load error:',e.message||e);
    setSyncStatus('err','Erreur: '+(e.message||'connexion').slice(0,50));
    loadLocal(false);
  }
}

// ─── SUPABASE SAVE ────────────────────────────────────────
let _bgSync=false;
async function saveToCloud(){
  if(isSaving){pendingSave=true;return;}
  isSaving=true;
  saveLocal();
  setSyncStatus('syncing','Sauvegarde...');
  try{
    const r=await fetch(`${SB_URL}/rest/v1/donnees?id=eq.${ROW_ID}`,{
      method:'PATCH',
      headers:{...SB_HEADERS,'Prefer':'return=minimal'},
      body:JSON.stringify({data:getCloudPayload()})
    });
    if(!r.ok)throw new Error('save failed');
    const t=new Date().toLocaleTimeString('fr-CA',{hour:'2-digit',minute:'2-digit'});
    setSyncStatus('ok',`Synchronisé à ${t}`);
  }catch(e){
    setSyncStatus('err','Erreur sync — sauvegardé localement');
  }finally{
    isSaving=false;
    if(pendingSave){pendingSave=false;saveToCloud();}
  }
}

function getCloudPayload(){
  return{entries:state.entries,chantiers:state.chantiers,typesTravaux:state.typesTravaux,fiches:state.fiches,entryId:state.entryId,clients:state.clients,clientId:state.clientId,empInfos:state.empInfos||{},tickets:state.tickets,ticketId:state.ticketId,suggestions:state.suggestions,suggestionId:state.suggestionId,

}

      const t=new Date().toLocaleTimeString('fr-CA',{hour:'2-digit',minute:'2-digit'});
      setSyncStatus('ok','Sync '+t);
      // Refresh reglages if user is on that page (to show new tickets/suggestions)
      if(state.currentEmp==='reglages'){
        const sub=window._reglagesSub||'backup';
        if(sub==='problemes'||sub==='suggestions'){
          const c=document.getElementById('content-reglages');
          if(c&&sub==='problemes')c.innerHTML=buildProblemes();
          if(c&&sub==='suggestions')c.innerHTML=buildSuggestions();
        }
      }
    }
  }catch(e){}
},30000);

// ─── UTILS ────────────────────────────────────────────────
function fmtDate(d){return`${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;}
function fmtDateFr(s){if(!s)return'';return new Date(s+'T12:00:00').toLocaleDateString('fr-CA',{weekday:'long',day:'numeric',month:'long',year:'numeric'});}
function fmtDateShort(s){if(!s)return'';return new Date(s+'T12:00:00').toLocaleDateString('fr-CA',{day:'numeric',month:'short'});}
function esc(s){return String(s||'').replace(/'/g,"\\'").replace(/"/g,'&quot;');}
function selOpts(list,sel='',ph='-- Choisir --'){return`<option value="">${ph}</option>`+list.map(i=>`<option value="${esc(i)}"${i===sel?' selected':''}>${i}</option>`).join('');}
function calcMontant(hFact,ch){const f=state.fiches[ch]||{};const t=parseFloat(f.taux)||0,fg=parseFloat(f.fraisGestion)||0;if(!t)return null;return hFact*t*(1+fg/100);}
function fmtMoney(v){return v!=null?v.toFixed(2)+' $':'—';}

function setEmp(emp){
  state.currentEmp=emp;
  document.querySelectorAll('.top-nav button').forEach(b=>b.classList.remove('active'));
  const tabBtn=document.querySelector(`.tab-${emp}`);
  if(tabBtn)tabBtn.classList.add('active');
  document.querySelectorAll('.page').forEach(p=>p.classList.remove('active'));
  if(emp==='victor'||emp==='edouard'||emp==='denis'||emp==='guewenn'){
    document.getElementById('page-heures').classList.add('active');
    document.querySelector('.tab-heures').classList.add('active');
    currentHeuresEmp=emp;
    setHeuresEmp(emp);
    return;
  }
  const page=document.getElementById('page-'+emp);
  if(page)page.classList.add('active');
  if(emp==='victor'||emp==='edouard'||emp==='denis'||emp==='guewenn'){
    setHeuresEmp(emp);
  } else if(emp==='rapport'){
    if(!window._rapportMainSub)window._rapportMainSub='dashboard';
    // Force update subnav
    const rbtns=document.querySelectorAll('#rapport-subnav button');
    const rsubs=['dashboard','chantier','employe','paie','periode'];
    rbtns.forEach((b,i)=>b.classList.toggle('active',rsubs[i]===(window._rapportMainSub||'dashboard')));
    buildDashboard();
  } else if(emp==='reglages'){
    renderReglages();
  } else if(emp==='entreprise'){
    renderEntreprise();
  } else {
    const defaultSubs={facturation:'courantes',chantiers:'clients'};
    setSub(emp, state.currentSub[emp]||defaultSubs[emp]||'');
  }
}

// ─── CALENDAR ─────────────────────────────────────────────
function buildCal(emp){
  // Safety: ensure entries exist for this employee
  if(!state.entries[emp])state.entries[emp]=[];
  if(!state.calMonth[emp]&&state.calMonth[emp]!==0)state.calMonth[emp]=new Date().getMonth();
  if(!state.calYear[emp])state.calYear[emp]=new Date().getFullYear();
  const e=EMPS[emp],m=state.calMonth[emp],y=state.calYear[emp];
  const mN=['Janvier','Février','Mars','Avril','Mai','Juin','Juillet','Août','Septembre','Octobre','Novembre','Décembre'];
  const dN=['L','M','M','J','V','S','D'];
  const offset=(new Date(y,m,1).getDay()||7)-1;
  const dim=new Date(y,m+1,0).getDate();
  const dm={};
  state.entries[emp].forEach(en=>{if(!dm[en.date])dm[en.date]={total:0,fact:0};dm[en.date].total+=en.heures;if(en.facturable)dm[en.date].fact+=en.heures;});
  let tm=0,fm=0;
  Object.entries(dm).forEach(([d,v])=>{const dd=new Date(d+'T12:00:00');if(dd.getMonth()===m&&dd.getFullYear()===y){tm+=v.total;fm+=v.fact;}});
  let h=`<div class="cal-header"><div class="cal-nav" style="display:flex;gap:8px;"><button onclick="prevMonth('${emp}')">‹</button><button onclick="nextMonth('${emp}')">›</button></div><h2>${mN[m]} ${y}</h2></div>
  <div class="stats-row" style="margin-bottom:12px;">
    <div class="stat-box"><div class="label">Total mois</div><div class="value">${tm.toFixed(1)}h</div></div>
    <div class="stat-box stat-fact"><div class="label">Facturable</div><div class="value">${fm.toFixed(1)}h</div></div>
    <div class="stat-box stat-nf"><div class="label">Non-fact.</div><div class="value">${(tm-fm).toFixed(1)}h</div></div>
  </div><div class="cal-grid">`;
  h+='<div class="drag-hint" style="grid-column:1/-1;">Clique sur un jour ou glisse pour sélectionner plusieurs jours</div>';
  dN.forEach(d=>h+=`<div class="cal-day-name">${d}</div>`);
  for(let i=0;i<offset;i++)h+=`<div class="cal-cell empty"></div>`;
  // Précalculer les totaux par semaine
  const weekTotals={};
  for(let d=1;d<=dim;d++){
    const ds=`${y}-${String(m+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
    const dow=(new Date(y,m,d).getDay()||7); // 1=Lun, 7=Dim
    const weekStart=new Date(y,m,d);
    weekStart.setDate(d-(dow-1));
    const wk=weekStart.toISOString().slice(0,10);
    if(!weekTotals[wk]){weekTotals[wk]={h:0,chantiers:{},days:[]};}
    if(dm[ds]){
      weekTotals[wk].h+=dm[ds].total;
      state.entries[emp].filter(en=>en.date===ds&&en.heures>0&&!en.absence).forEach(en=>{
        if(!weekTotals[wk].chantiers[en.chantier||'—'])weekTotals[wk].chantiers[en.chantier||'—']=0;
        weekTotals[wk].chantiers[en.chantier||'—']+=en.heures;
      });
    }
    weekTotals[wk].days.push(d);
  }

  let lastWk='';
  for(let d=1;d<=dim;d++){
    const ds=`${y}-${String(m+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
    const dow=(new Date(y,m,d).getDay()||7);
    const weekStart=new Date(y,m,d);weekStart.setDate(d-(dow-1));
    const wk=weekStart.toISOString().slice(0,10);
    const v=dm[ds],it=ds===todayStr;
    // Insérer barre semaine avant lundi (sauf première semaine si offset>0)
    if(dow===1&&wk!==lastWk&&d>1){
      const wt=weekTotals[wk]||{h:0,chantiers:{}};
      const prevWk=Object.keys(weekTotals).find(k=>weekTotals[k].days.includes(d-1));
      const pwt=prevWk?weekTotals[prevWk]:{h:0,chantiers:{}};
      const chStr=Object.entries(pwt.chantiers).sort((a,b)=>b[1]-a[1]).slice(0,2).map(([ch,h])=>`${ch}: ${h.toFixed(0)}h`).join(' · ');
      const wkId='wk-'+emp+'-'+prevWk;
      h+=`<div style="grid-column:1/-1;background:#f9f9f9;border-radius:6px;padding:4px 8px;margin:2px 0;display:flex;justify-content:space-between;align-items:center;cursor:pointer;border:0.5px solid var(--border);" onclick="toggleWeekDetail('${wkId}')">
        <span style="font-size:10px;font-weight:600;color:var(--secondary);">Sem. ${prevWk?prevWk.slice(5):''}</span>
        <span style="font-size:11px;font-weight:700;color:${e.col};">${pwt.h.toFixed(1)}h</span>
        <span style="font-size:10px;color:var(--secondary);display:none;" id="${wkId}-detail">${chStr}</span>
        <span style="font-size:10px;color:var(--secondary);">›</span>
      </div>
      <div id="${wkId}-detail-full" style="display:none;grid-column:1/-1;background:#f0f4ff;border-radius:6px;padding:8px;margin:2px 0;font-size:11px;">
        ${Object.entries(pwt.chantiers).sort((a,b)=>b[1]-a[1]).map(([ch,h])=>`<div style="display:flex;justify-content:space-between;padding:1px 0;"><span>${ch}</span><span style="font-weight:600;">${h.toFixed(1)}h</span></div>`).join('')}
        <div style="display:flex;justify-content:space-between;border-top:0.5px solid var(--border);margin-top:4px;padding-top:4px;font-weight:700;"><span>Total</span><span>${pwt.h.toFixed(1)}h</span></div>
      </div>`;
      lastWk=wk;
    }
    if(!lastWk)lastWk=wk;
    let fH='';
    if(v&&v.fact>0&&v.fact<v.total)fH=`<div class="day-f" style="color:#888;">F+NF</div>`;
    else if(v&&v.fact>0)fH=`<div class="day-f" style="color:#27500A;">F</div>`;
    else if(v&&v.total>0)fH=`<div class="day-f" style="color:#791F1F;">NF</div>`;
    h+=`<div class="cal-cell${it?' today':''}${v?' has-data':''}" 
      style="${v?'border-color:'+e.border+';':''};user-select:none;-webkit-user-select:none;"
      data-date="${ds}" data-emp="${emp}"
      onmousedown="startDrag('${ds}','${emp}',event)"
      onmouseover="continueDrag('${ds}',event)"
      onmouseup="endDrag('${ds}','${emp}',event)"
      ontouchstart="startDrag('${ds}','${emp}',event)"
      ontouchmove="touchDrag(event)"
      ontouchend="endDrag('${ds}','${emp}',event)"
      onclick="if(!_dragged)openModal('${ds}','${emp}')">
      <div class="day-num" style="${it?'color:'+e.col+';':''}">${d}</div>
      ${v?(()=>{
        const absEntries=state.entries[emp].filter(en=>en.date===ds&&en.absence);
        const absType=absEntries.length?absEntries[0].absence:'';
        const absColor=absType==='conge'?'#0C447C':absType==='maladie'?'#791F1F':absType==='ferie'?'#633806':e.col;
        const absIcon=absType==='conge'?'🏖':absType==='maladie'?'🤒':absType==='ferie'?'⭐':'';
        return `<div class="day-h" style="color:${absColor};">${absIcon||v.total.toFixed(1)+'h'}</div>`;
      })():''}${fH}
    </div>`;
  }
  // Dernière semaine
  const lastWeekKeys=Object.keys(weekTotals);
  if(lastWeekKeys.length){
    const lastKey=lastWeekKeys[lastWeekKeys.length-1];
    const lwt=weekTotals[lastKey];
    const lwkId='wk-'+emp+'-'+lastKey;
    const chStr=Object.entries(lwt.chantiers).sort((a,b)=>b[1]-a[1]).slice(0,2).map(([ch,h])=>ch+': '+h.toFixed(0)+'h').join(' · ');
    h+=`<div style="grid-column:1/-1;background:#f9f9f9;border-radius:6px;padding:4px 8px;margin:2px 0;display:flex;justify-content:space-between;align-items:center;cursor:pointer;border:0.5px solid var(--border);" onclick="toggleWeekDetail('${lwkId}')">
      <span style="font-size:10px;font-weight:600;color:var(--secondary);">Sem. ${lastKey.slice(5)}</span>
      <span style="font-size:11px;font-weight:700;color:${e.col};">${lwt.h.toFixed(1)}h</span>
      <span style="font-size:10px;color:var(--secondary);">›</span>
    </div>
    <div id="${lwkId}-detail-full" style="display:none;grid-column:1/-1;background:#f0f4ff;border-radius:6px;padding:8px;margin:2px 0;font-size:11px;">
      ${Object.entries(lwt.chantiers).sort((a,b)=>b[1]-a[1]).map(([ch,h2])=>`<div style="display:flex;justify-content:space-between;padding:1px 0;"><span>${ch}</span><span style="font-weight:600;">${h2.toFixed(1)}h</span></div>`).join('')}
      <div style="display:flex;justify-content:space-between;border-top:0.5px solid var(--border);margin-top:4px;padding-top:4px;font-weight:700;"><span>Total</span><span>${lwt.h.toFixed(1)}h</span></div>
    </div>`;
  }
  return h+'</div>';
}
function prevMonth(emp){
  if(state.calMonth[emp]===0){state.calMonth[emp]=11;state.calYear[emp]--;}else state.calMonth[emp]--;
  const c=document.getElementById('content-heures');
  if(c)c.innerHTML=buildCal(emp);
}
function nextMonth(emp){
  if(state.calMonth[emp]===11){state.calMonth[emp]=0;state.calYear[emp]++;}else state.calMonth[emp]++;
  const c=document.getElementById('content-heures');
  if(c)c.innerHTML=buildCal(emp);
}

function getLignes(){
  const lignes=[];
  const container=document.getElementById('m-lignes');
  if(container){
    container.querySelectorAll('.m-ligne').forEach(ligne=>{
      const ty=ligne.querySelector('.m-ty');
      const h=ligne.querySelector('.m-h');
      const heures=parseFloat(h&&h.value)||0;
      if(heures>0)lignes.push({type:ty?ty.value:'',heures});
    });
  }
  // Fallback: old single field system
  if(!lignes.length){
    const hField=document.getElementById('m-h');
    const tyField=document.getElementById('m-ty');
    if(hField&&parseFloat(hField.value)>0){
      lignes.push({type:tyField?tyField.value:'',heures:parseFloat(hField.value)});
    }
  }
  return lignes;
}

function saveEntry(emp,date){
  const lignes=getLignes();
  if(!lignes.length){alert("Veuillez entrer au moins une ligne avec des heures.");return;}
  const chantier=document.getElementById('m-ch').value;
  const desc=document.getElementById('m-de').value.trim();
  lignes.forEach(l=>{
    state.entries[emp].push({id:++state.entryId,date,heures:l.heures,chantier,type:l.type,desc,facturable:state.pendingFacturable});
  });
  closeModal();
  const _c=document.getElementById('content-heures');
  if(_c)_c.innerHTML=buildCal(emp);
  saveToCloud();
}
function delEntry(id,emp,date){if(!confirm("Supprimer?"))return;state.entries[emp]=state.entries[emp].filter(e=>e.id!==id);closeModal();
  const _cd=document.getElementById('content-heures');
  if(_cd)_cd.innerHTML=buildCal(emp);
  saveToCloud();}
function editEntry(id,emp,date){
  const en=state.entries[emp].find(e=>e.id===id);
  if(!en)return;
  state.pendingFacturable=en.facturable;
  const chOpts=selOpts(state.chantiers,en.chantier);
  const tyOpts=selOpts(state.typesTravaux,en.type);
  document.getElementById('modalBox').innerHTML=
    '<div class="modal-header"><h3>Modifier une entree</h3><button class="modal-close" onclick="cancelEdit(\'' +date+ '\',\'' +emp+ '\')">×</button></div>'+
    '<div style="background:#fff3cd;border-radius:var(--radius-sm);padding:8px 12px;margin-bottom:12px;font-size:12px;color:#856404;">✏️ '+fmtDateFr(date)+'</div>'+
    '<label style="font-size:11px;color:var(--secondary);font-weight:500;display:block;margin-bottom:4px;">Facturable</label>'+
    '<div class="toggle-group"><button id="btn-f" class="'+(en.facturable?'on-f':'')+'" onclick="setFact(true)">✓ Facturable</button><button id="btn-nf" class="'+(!en.facturable?'on-nf':'')+'" onclick="setFact(false)">✕ Non facturable</button></div>'+
    '<div class="grid2"><div class="field"><label>Heures</label><input type="number" id="m-h" min="0" step="0.25" value="'+en.heures+'" inputmode="decimal"/></div>'+
    '<div class="field"><label>Chantier</label><select id="m-ch">'+chOpts+'</select></div></div>'+
    '<div class="field"><label>Type de travaux</label><select id="m-ty">'+tyOpts+'</select></div>'+
    '<div class="field"><label>Description</label><input type="text" id="m-de" value="'+(en.desc||'')+'"/></div>'+
    '<div style="display:flex;gap:8px;"><button class="btn btn-primary" style="flex:1;" onclick="saveEdit('+id+',\'' +emp+ '\',\'' +date+ '\')">✓ Enregistrer</button>'+
    '<button class="btn btn-sm" onclick="cancelEdit(\'' +date+ '\',\'' +emp+ '\')">Annuler</button></div>';
  document.getElementById('modalOverlay').classList.add('open');
}

function saveEdit(id,emp,date){
  const h=parseFloat(document.getElementById('m-h').value)||0;
  if(h<=0){document.getElementById('m-h').focus();return;}
  const idx=state.entries[emp].findIndex(e=>e.id===id);
  if(idx===-1)return;
  state.entries[emp][idx]={
    id:id,date:date,
    heures:h,
    chantier:document.getElementById('m-ch').value,
    type:document.getElementById('m-ty').value,
    desc:document.getElementById('m-de').value.trim(),
    facturable:state.pendingFacturable
  };
  closeModal();
  const _ce=document.getElementById('content-heures');
  if(_ce)_ce.innerHTML=buildCal(emp);
  saveToCloud();
}

function cancelEdit(date,emp){openModal(date,emp);}

function editFromList(id,emp){
  const en=state.entries[emp].find(e=>e.id===id);
  if(en)editEntry(id,emp,en.date);
}

function closeModal(){document.getElementById('modalOverlay').classList.remove('open');}
function closeModalOutside(e){if(e.target===document.getElementById('modalOverlay'))closeModal();}

// ─── LISTE ────────────────────────────────────────────────
function buildListe(emp){
  const e=EMPS[emp],list=state.entries[emp].slice().sort((a,b)=>b.date.localeCompare(a.date));
  if(!list.length)return`<div class="empty">Aucune entrée pour ${e.label}.</div>`;
  const total=list.reduce((s,en)=>s+en.heures,0),fact=list.filter(en=>en.facturable).reduce((s,en)=>s+en.heures,0);
  return`<div class="stats-row"><div class="stat-box"><div class="label">Total</div><div class="value">${total.toFixed(1)}h</div></div><div class="stat-box stat-fact"><div class="label">Facturable</div><div class="value">${fact.toFixed(1)}h</div></div><div class="stat-box stat-nf"><div class="label">Non-fact.</div><div class="value">${(total-fact).toFixed(1)}h</div></div></div>
  <div class="card">${list.map(en=>`<div class="list-item"><div class="li-date">${fmtDateShort(en.date)}</div><span class="fbadge ${en.facturable?'fb-y':'fb-n'}">${en.facturable?'F':'NF'}</span><span class="li-h" style="color:${e.col};">${en.heures}h</span><div class="li-info"><div class="t1">${en.chantier||'—'}</div><div class="t2">${[en.type,en.desc].filter(Boolean).join(' · ')||'—'}</div></div><button class="btn-edit" onclick="editFromList(${en.id},'${emp}')">✏️</button><button class="btn-del" onclick="delList(${en.id},'${emp}')">✕</button></div>`).join('')}</div>`;
}
function delList(id,emp){if(!confirm("Supprimer?"))return;state.entries[emp]=state.entries[emp].filter(e=>e.id!==id);
  const _cl=document.getElementById('content-heures');
  const _sub=state.currentSub[emp]||'cal';
  if(_cl){if(_sub==='liste')_cl.innerHTML=buildListe(emp);else _cl.innerHTML=buildCal(emp);}
  saveToCloud();}

// ─── RAPPORT EMP ──────────────────────────────────────────
function buildRapportEmp(emp){
  const e=EMPS[emp],list=state.entries[emp].filter(en=>en.heures>0);
  if(!list.length)return`<div class="empty">Aucune entrée pour ${e.label}.</div>`;
  const total=list.reduce((s,en)=>s+en.heures,0),fact=list.filter(en=>en.facturable).reduce((s,en)=>s+en.heures,0);
  const byCh={},byTy={};
  list.forEach(en=>{
    if(en.chantier){if(!byCh[en.chantier])byCh[en.chantier]={total:0,fact:0};byCh[en.chantier].total+=en.heures;if(en.facturable)byCh[en.chantier].fact+=en.heures;}
    if(en.type){if(!byTy[en.type])byTy[en.type]={total:0,fact:0};byTy[en.type].total+=en.heures;if(en.facturable)byTy[en.type].fact+=en.heures;}
  });
  const chR=Object.entries(byCh).sort((a,b)=>b[1].total-a[1].total).map(([ch,v])=>{const m=calcMontant(v.fact,ch);return`<tr><td>${ch}</td><td>${v.total.toFixed(1)}h</td><td><span class="fbadge fb-y">${v.fact.toFixed(1)}h</span></td><td style="font-weight:600;color:#0C447C;">${fmtMoney(m)}</td></tr>`;}).join('');
  const tyR=Object.entries(byTy).sort((a,b)=>b[1].total-a[1].total).map(([t,v])=>`<tr><td>${t}</td><td>${v.total.toFixed(1)}h</td><td><span class="fbadge fb-y">${v.fact.toFixed(1)}h</span></td><td></td></tr>`).join('');
  return`<div class="stats-row"><div class="stat-box"><div class="label">Total</div><div class="value" style="color:${e.col};">${total.toFixed(1)}h</div></div><div class="stat-box stat-fact"><div class="label">Facturable</div><div class="value">${fact.toFixed(1)}h</div></div><div class="stat-box stat-nf"><div class="label">Non-fact.</div><div class="value">${(total-fact).toFixed(1)}h</div></div></div>
  <div class="card"><div class="section-label">PAR CHANTIER</div><table class="mini-table"><thead><tr><td><b>Chantier</b></td><td style="text-align:right;"><b>Total</b></td><td style="text-align:right;"><b>Fact.</b></td><td style="text-align:right;"><b>Montant</b></td></tr></thead><tbody>${chR||'<tr><td colspan="4" style="color:var(--secondary);">—</td></tr>'}</tbody></table>
  <div class="section-label" style="margin-top:12px;">PAR TYPE DE TRAVAUX</div><table class="mini-table"><tbody>${tyR||'<tr><td colspan="4">—</td></tr>'}</tbody></table>
  <p style="font-size:10px;color:var(--secondary);margin:8px 0 0;">* Montant = heures fact. × taux × (1 + frais gestion %)</p></div>`;
}


// ─── RAPPORT COMPLET ──────────────────────────────────────
function setRapportSub(sub){
  window._rapportMainSub=sub;
  const btns=document.querySelectorAll('#rapport-subnav button');
  const subs=['dashboard','suivi','chantier','employe','paie','periode'];
  btns.forEach((b,i)=>b.classList.toggle('active',subs[i]===sub));
  const c=document.getElementById('content-rapport');
  if(!c)return;
  c.innerHTML='';
  if(sub==='dashboard'){buildDashboard();}
  else if(sub==='suivi'){buildRapportSuivi();}
  else if(sub==='chantier'){buildRapportChantier();}
  else if(sub==='employe'){buildRapportEmployes();}
  else if(sub==='paie'){buildRapportPaie();}
  else{renderRapportPeriode();}
}

function renderRapportPeriode(){
  const sub=window._rapportMainSub||'dashboard';
  if(sub==='dashboard'){buildDashboard();return;}
  if(sub==='suivi'){buildRapportSuivi();return;}
  if(sub==='chantier'){buildRapportChantier();return;}
  if(sub==='employe'){buildRapportEmployes();return;}
  if(sub==='paie'){buildRapportPaie();return;}
  // Default: periode
  document.getElementById('content-rapport').innerHTML=`
    <div class="card">
      <div class="card-title">📊 Rapports</div>

        <button id="rtype-chantier" class="toggle-group" style="flex:1;padding:10px;font-size:12px;font-weight:500;border:none;cursor:pointer;background:#1a1a1a;color:#fff;" onclick="setRapportType('chantier')">🏗 Par chantier</button>
        <button id="rtype-date" class="toggle-group" style="flex:1;padding:10px;font-size:12px;font-weight:500;border:none;cursor:pointer;background:#fff;color:var(--secondary);" onclick="setRapportType('date')">📅 Par période</button>
        <button id="rtype-depense" class="toggle-group" style="flex:1;padding:10px;font-size:12px;font-weight:500;border:none;cursor:pointer;background:#fff;color:var(--secondary);" onclick="setRapportType('depense')">🏷 Par type</button>

function getFilterVals(){
  return{
    ch: document.getElementById('rf-ch')?document.getElementById('rf-ch').value:'',
    d1: document.getElementById('rf-d1')?document.getElementById('rf-d1').value:'',
    d2: document.getElementById('rf-d2')?document.getElementById('rf-d2').value:'',
    emp: document.getElementById('rf-emp')?document.getElementById('rf-emp').value:'',
    ty: document.getElementById('rf-ty')?document.getElementById('rf-ty').value:'',
    dep: document.getElementById('rf-dep')?document.getElementById('rf-dep').value:'',
    carte: document.getElementById('rf-carte')?document.getElementById('rf-carte').value:''
  };
}

function filterEntries(f){
  const d1=f.d1?new Date(f.d1+'T00:00:00'):null;
  const d2=f.d2?new Date(f.d2+'T23:59:59'):null;
  const empKeys=f.emp?[f.emp]:Object.keys(EMPS);
  let all=[];
  empKeys.forEach(empKey=>{
    state.entries[empKey].filter(en=>{
      if(!en.heures)return false;
      if(f.ch&&en.chantier!==f.ch)return false;
      if(f.ty&&en.type!==f.ty)return false;
      if(d1&&new Date(en.date+'T12:00:00')<d1)return false;
      if(d2&&new Date(en.date+'T12:00:00')>d2)return false;
      return true;
    }).forEach(en=>all.push({...en,empKey}));
  });
  return all;
}

function genRapport(){
  const f=getFilterVals();
  const type=window._rapportType||'chantier';
  if(!f.d1&&!f.d2&&!f.ch&&!f.emp&&!f.ty){
    alert("Veuillez entrer au moins un filtre.");return;
  }
  const entries=filterEntries(f);
  if(!entries.length){
    document.getElementById('rp-result').innerHTML='<div class="empty">Aucune heure trouvée pour ces critères.</div>';
    return;
  }

  const totalH=entries.reduce((s,en)=>s+en.heures,0);
  const factH=entries.filter(en=>en.facturable).reduce((s,en)=>s+en.heures,0);

  // Grand total montant
  let grandMontant=0;
  const hParChantier={};
  entries.filter(en=>en.facturable).forEach(en=>{
    if(!hParChantier[en.chantier])hParChantier[en.chantier]=0;
    hParChantier[en.chantier]+=en.heures;
  });
  Object.entries(hParChantier).forEach(([ch,h])=>{const m=calcMontant(h,ch);if(m)grandMontant+=m;});

  let html=`
    <div class="stats-row${grandMontant>0?'-4':''}">
      <div class="stat-box"><div class="label">Total heures</div><div class="value">${totalH.toFixed(1)}h</div></div>
      <div class="stat-box stat-fact"><div class="label">Facturable</div><div class="value">${factH.toFixed(1)}h</div></div>
      <div class="stat-box stat-nf"><div class="label">Non-fact.</div><div class="value">${(totalH-factH).toFixed(1)}h</div></div>
      ${grandMontant>0?`<div class="stat-box stat-money"><div class="label">💰 Montant</div><div class="value">${grandMontant.toFixed(0)} $</div></div>`:''}
    </div>`;

  if(type==='chantier'){
    // Group by chantier
    const byCh={};
    entries.forEach(en=>{
      if(!byCh[en.chantier||'—'])byCh[en.chantier||'—']={total:0,fact:0,emps:{},types:{}};
      const c=byCh[en.chantier||'—'];
      c.total+=en.heures;if(en.facturable)c.fact+=en.heures;
      if(!c.emps[en.empKey])c.emps[en.empKey]=0;c.emps[en.empKey]+=en.heures;
      if(!c.types[en.type||'—'])c.types[en.type||'—']=0;c.types[en.type||'—']+=en.heures;
    });
    Object.entries(byCh).sort((a,b)=>b[1].total-a[1].total).forEach(([ch,d])=>{
      const m=calcMontant(d.fact,ch);
      const empRows=Object.entries(d.emps).map(([ek,h])=>`<tr><td style="padding:3px 0;"><span class="emp-badge ${EMPS[ek]?'':''}">
        <span style="display:inline-flex;align-items:center;justify-content:center;width:20px;height:20px;border-radius:50%;background:${EMPS[ek]?EMPS[ek].bg:'#eee'};color:${EMPS[ek]?EMPS[ek].col:'#666'};font-size:9px;font-weight:600;margin-right:4px;">${EMPS[ek]?EMPS[ek].label.slice(0,2).toUpperCase():'?'}</span>${EMPS[ek]?EMPS[ek].label:ek}</span></td><td style="text-align:right;">${h.toFixed(1)}h</td></tr>`).join('');
      const typeRows=Object.entries(d.types).sort((a,b)=>b[1]-a[1]).map(([t,h])=>`<tr><td style="padding:2px 0;font-size:11px;color:var(--secondary);">${t}</td><td style="text-align:right;font-size:11px;">${h.toFixed(1)}h</td></tr>`).join('');
      html+=`<div class="card">
        <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:10px;">
          <div><div style="font-size:14px;font-weight:600;">🏗 ${ch}</div>${m?`<div style="font-size:12px;color:#0C447C;font-weight:600;">💰 ${m.toFixed(2)} $</div>`:''}</div>
          <div style="text-align:right;"><div style="font-size:18px;font-weight:700;">${d.total.toFixed(1)}h</div>
          <div style="display:flex;gap:4px;justify-content:flex-end;"><span class="fbadge fb-y">F ${d.fact.toFixed(1)}h</span><span class="fbadge fb-n">NF ${(d.total-d.fact).toFixed(1)}h</span></div></div>
        </div>
        <div style="display:grid;grid-template-columns:1fr 1fr;gap:10px;">
          <div><div class="section-label">PAR EMPLOYÉ</div><table class="mini-table"><tbody>${empRows}</tbody></table></div>
          <div><div class="section-label">PAR TYPE</div><table class="mini-table"><tbody>${typeRows}</tbody></table></div>
        </div>
      </div>`;
    });
  } else if(type==='date'){
    // Group by employee then by week
    Object.entries(EMPS).forEach(([empKey,e])=>{
      const empEntries=entries.filter(en=>en.empKey===empKey);
      if(!empEntries.length)return;
      const total=empEntries.reduce((s,en)=>s+en.heures,0);
      const fact=empEntries.filter(en=>en.facturable).reduce((s,en)=>s+en.heures,0);
      const byCh={};
      empEntries.forEach(en=>{if(!byCh[en.chantier||'—'])byCh[en.chantier||'—']=0;byCh[en.chantier||'—']+=en.heures;});
      const chRows=Object.entries(byCh).sort((a,b)=>b[1]-a[1]).map(([ch,h])=>`<tr><td style="padding:4px 0;">${ch}</td><td style="text-align:right;">${h.toFixed(1)}h</td></tr>`).join('');
      const detRows=empEntries.sort((a,b)=>a.date.localeCompare(b.date)).map(en=>`
        <tr style="border-bottom:0.5px solid var(--border);">
          <td style="padding:4px 0;font-size:11px;color:var(--secondary);">${en.date}</td>
          <td style="padding:4px 0;font-size:12px;">${en.chantier||'—'}</td>
          <td style="padding:4px 0;font-size:11px;color:var(--secondary);">${en.type||'—'}</td>
          <td style="padding:4px 0;text-align:right;"><span class="fbadge ${en.facturable?'fb-y':'fb-n'}">${en.heures}h</span></td>
        </tr>`).join('');
      html+=`<div class="card">
        <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:10px;">
          <div style="display:flex;align-items:center;gap:8px;">
            <div style="width:32px;height:32px;border-radius:50%;background:${e.bg};color:${e.col};display:flex;align-items:center;justify-content:center;font-weight:600;font-size:11px;">${e.label.slice(0,2).toUpperCase()}</div>
            <span style="font-size:15px;font-weight:600;color:${e.col};">${e.label}</span>
          </div>
          <div style="text-align:right;"><div style="font-size:18px;font-weight:700;">${total.toFixed(1)}h</div>
          <div style="display:flex;gap:4px;justify-content:flex-end;"><span class="fbadge fb-y">F ${fact.toFixed(1)}h</span><span class="fbadge fb-n">NF ${(total-fact).toFixed(1)}h</span></div></div>
        </div>
        <div class="section-label">PAR CHANTIER</div>
        <table class="mini-table" style="margin-bottom:10px;"><tbody>${chRows}</tbody></table>
        <details><summary>Voir le détail (${empEntries.length} entrée${empEntries.length>1?'s':''})</summary>
          <table class="mini-table" style="margin-top:6px;">
            <thead><tr><td style="font-size:10px;font-weight:600;">Date</td><td style="font-size:10px;font-weight:600;">Chantier</td><td style="font-size:10px;font-weight:600;">Type</td><td style="text-align:right;font-size:10px;font-weight:600;">H</td></tr></thead>
            <tbody>${detRows}</tbody>
          </table>
        </details>
      </div>`;
    });
  } else {
    // Group achats by type de depense
    const d1dep=f.d1?new Date(f.d1+'T00:00:00'):null;
    const d2dep=f.d2?new Date(f.d2+'T23:59:59'):null;
    const achatsFiltered=state.achats.filter(a=>{
      if(f.dep&&a.typeDepense!==f.dep)return false;
      if(f.carte&&a.carte!==f.carte)return false;
      if(d1dep&&new Date(a.date+'T12:00:00')<d1dep)return false;
      if(d2dep&&new Date(a.date+'T12:00:00')>d2dep)return false;
      return true;
    });
    if(!achatsFiltered.length){
      html+='<div class="empty">Aucune dépense trouvée pour ces critères.</div>';
    } else {
      const totalDep=achatsFiltered.reduce((s,a)=>s+(parseFloat(a.montantAvantTax)||0),0);
      const totalAvecTax=achatsFiltered.reduce((s,a)=>s+(parseFloat(a.montantAvecTax)||0),0);
      const parCarte={Victor:0,Edouard:0,Denis:0,Guewenn:0};
      achatsFiltered.forEach(a=>{if(parCarte[a.carte]!==undefined)parCarte[a.carte]+=(parseFloat(a.montantAvantTax)||0);});
      // Replace stats row with money stats
      html=`<div class="stats-row-4">
        <div class="stat-box"><div class="label">Total avant taxes</div><div class="value">${totalDep.toFixed(2)} $</div></div>
        <div class="stat-box" style="background:#E6F1FB;"><div class="label">💳 Victor</div><div class="value" style="color:#0C447C;">${parCarte.Victor.toFixed(2)} $</div></div>
        <div class="stat-box" style="background:#E1F5EE;"><div class="label">💳 Edouard</div><div class="value" style="color:#085041;">${parCarte.Edouard.toFixed(2)} $</div></div>
        <div class="stat-box" style="background:#FAEEDA;"><div class="label">💳 Denis</div><div class="value" style="color:#633806;">${parCarte.Denis.toFixed(2)} $</div></div>
        <div class="stat-box" style="background:#F3E8FF;"><div class="label">💳 Guewenn</div><div class="value" style="color:#6B21A8;">${parCarte.Guewenn.toFixed(2)} $</div></div>
      </div>`;
      const byDep={};
      achatsFiltered.forEach(a=>{
        const t=a.typeDepense||'—';
        if(!byDep[t])byDep[t]={total:0,items:[],parCarte:{Victor:0,Edouard:0,Denis:0}};
        byDep[t].total+=(parseFloat(a.montantAvantTax)||0);
        byDep[t].items.push(a);
        if(byDep[t].parCarte[a.carte]!==undefined)byDep[t].parCarte[a.carte]+=(parseFloat(a.montantAvantTax)||0);
      });
      Object.entries(byDep).sort((a,b)=>b[1].total-a[1].total).forEach(([dep,d])=>{
        const carteRows=Object.entries(d.parCarte).filter(([c,v])=>v>0).map(([c,v])=>`<tr><td style="padding:3px 0;font-size:12px;">💳 ${c}</td><td style="text-align:right;">${v.toFixed(2)} $</td></tr>`).join('');
        const detRows=d.items.sort((a,b)=>a.date.localeCompare(b.date)).map(a=>`
          <tr style="border-bottom:0.5px solid var(--border);">
            <td style="padding:4px 0;font-size:11px;color:var(--secondary);">${a.date}</td>
            <td style="padding:4px 0;font-size:12px;">${a.magasin||'—'}</td>
            <td style="padding:4px 0;font-size:11px;color:var(--secondary);">${a.description||'—'}</td>
            <td style="padding:4px 0;"><span style="font-size:10px;background:#E6F1FB;color:#0C447C;padding:2px 6px;border-radius:20px;">💳 ${a.carte}</span></td>
            <td style="padding:4px 0;text-align:right;font-weight:600;">${parseFloat(a.montantAvantTax).toFixed(2)} $</td>
          </tr>`).join('');
        html+=`<div class="card">
          <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:10px;">
            <div style="font-size:14px;font-weight:600;">🏷 ${dep}</div>
            <div style="font-size:18px;font-weight:700;">${d.total.toFixed(2)} $</div>
          </div>
          <div class="section-label">PAR CARTE</div>
          <table class="mini-table" style="margin-bottom:10px;"><tbody>${carteRows}</tbody></table>
          <details><summary>Voir le détail (${d.items.length} achat${d.items.length>1?'s':''})</summary>
            <table class="mini-table" style="margin-top:6px;">
              <thead><tr><td style="font-size:10px;font-weight:600;">Date</td><td style="font-size:10px;font-weight:600;">Magasin</td><td style="font-size:10px;font-weight:600;">Description</td><td style="font-size:10px;font-weight:600;">Carte</td><td style="text-align:right;font-size:10px;font-weight:600;">Montant</td></tr></thead>
              <tbody>${detRows}</tbody>
            </table>
          </details>
        </div>`;
      });
    }
  }

  html+=`<div style="display:flex;gap:8px;margin-top:4px;" class="no-print">
    <button class="btn-pdf" onclick="exportRapportPDF()">📄 Exporter PDF</button>
    <button class="btn btn-sm" onclick="resetRapport()">↺ Réinitialiser</button>
  </div>`;
  document.getElementById('rp-result').innerHTML=html;
}

function exportRapportPDF(){
  const orig=document.title;
  document.title='Rapport_'+new Date().toISOString().slice(0,10);
  document.querySelectorAll('details').forEach(d=>d.open=true);
  window.print();
  setTimeout(()=>document.title=orig,1000);
}

function resetRapport(){
  document.getElementById('rp-result').innerHTML='';
  buildRapportFilters(window._rapportType||'chantier');
}

function openTypeModal(idx){
  const isNew=idx===-1;
  const val=isNew?'':state.typesTravaux[idx];
  document.getElementById('modalBox').innerHTML=`
    <div class="modal-header">
      <h3>${isNew?'Nouveau type de travaux':'Modifier le type'}</h3>
      <button class="modal-close" onclick="closeModal()">×</button>
    </div>
    <div class="field"><label>Nom du type de travaux</label>
      <input type="text" id="ty-nom" value="${val}" placeholder="Ex: Charpente, Béton..."/>
    </div>
    <div style="display:flex;gap:8px;">
      <button class="btn btn-primary" style="flex:1;" onclick="saveTypeModal(${idx})">💾 Sauvegarder</button>
      ${!isNew?`<button class="btn btn-sm btn-danger" onclick="removeTypeModal(${idx})">🗑 Supprimer</button>`:''}
    </div>`;
  document.getElementById('modalOverlay').classList.add('open');
  setTimeout(()=>{const n=document.getElementById('ty-nom');if(n){n.focus();n.select();}},200);
}

function saveTypeModal(idx){
  const val=document.getElementById('ty-nom').value.trim();
  if(!val){alert("Veuillez entrer un nom.");return;}
  if(idx===-1){
    if(state.typesTravaux.includes(val)){alert("Ce type existe déjà.");return;}
    state.typesTravaux.push(val);
    state.typesTravaux.sort();
  } else {
    state.typesTravaux[idx]=val;
    state.typesTravaux.sort();
  }
  closeModal();
  saveToCloud();
  const c=document.getElementById('content-chantiers');
  if(c)c.innerHTML=buildGestionListes();
}

function removeTypeModal(idx){
  if(!confirm("Supprimer ce type de travaux?"))return;
  state.typesTravaux.splice(idx,1);
  closeModal();
  saveToCloud();
  const c=document.getElementById('content-chantiers');
  if(c)c.innerHTML=buildGestionListes();
}
function addItem(kind,val){
  if(kind==='chantier'){
    if(!val){const el=document.getElementById('newCh');if(el)val=el.value.trim();}
    if(!val)return;
    if(!state.chantiers.includes(val)){state.chantiers.push(val);state.chantiers.sort();if(!state.fiches[val])state.fiches[val]={};}
    smartRender();saveToCloud();
  }
}
function removeItem(kind,val){
  if(!confirm("Supprimer \""+val+"\"?"))return;
  if(kind==='chantier')state.chantiers=state.chantiers.filter(c=>c!==val);
  else{state.typesTravaux=state.typesTravaux.filter(t=>t!==val);saveToCloud();const c=document.getElementById('content-chantiers');if(c)c.innerHTML=buildGestionListes();return;}
  smartRender();saveToCloud();
}
